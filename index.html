<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenton Ascended: Fast Start</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root {
        --dark-bg: #05070a;
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.08);
        --accent: #00d2ff;
        --rebirth-color: #9b59b6;
        --cost-color: #2ecc71;
        --text-primary: #e6edf3;
        --fira-font: 'Fira Code', monospace;
    }

    body, html { 
        font-family: var(--fira-font);
        margin: 0; padding: 0; height: 100%;
        color: var(--text-primary);
        background: var(--dark-bg);
        display: flex; flex-direction: column;
        overflow: hidden;
    }

    #snow-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    .snowflake { position: absolute; top: -10%; color: white; border-radius: 50%; pointer-events: none; animation: fall linear infinite; }
    @keyframes fall { to { transform: translateY(110vh); } }

    #game-layout { display: grid; grid-template-columns: 1fr 450px; height: calc(100% - 120px); width: 100vw; }

    #main-content { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; position: relative;}
    
    .header-group h1 { color: var(--accent); font-size: 2.5rem; margin: 0; letter-spacing: 2px; }
    .rebirth-stat { color: var(--rebirth-color); font-weight: bold; margin-bottom: 20px; }

    #clickable-image {
        cursor: pointer; width: 200px; height: 200px; object-fit: cover; border-radius: 50%;
        box-shadow: 0 0 40px rgba(0, 210, 255, 0.2); transition: all 0.05s; border: 3px solid var(--accent);
        user-select: none;
    }
    #clickable-image:active { transform: scale(0.92); filter: brightness(1.3); }

    #score-container {
        background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 15px;
        padding: 15px 40px; margin-top: 25px; font-size: 3rem; backdrop-filter: blur(10px);
    }

    /* Upgrades Sidebar */
    #upgrades-panel {
        background: rgba(0, 0, 0, 0.5); border-left: 1px solid var(--glass-border);
        padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
    }

    .upgrade-card {
        background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 8px;
        padding: 10px; cursor: pointer; transition: 0.2s; position: relative;
    }
    .upgrade-card:hover:not(.disabled) { background: rgba(255,255,255,0.07); border-color: var(--accent); }
    .upgrade-card.disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }

    .upgrade-title { color: var(--accent); font-weight: bold; font-size: 0.9rem; display: flex; justify-content: space-between;}
    .upgrade-cost { color: var(--cost-color); font-weight: bold; font-size: 0.85rem; }

    /* Tooltip / Info Box */
    #info-box {
        position: absolute; bottom: 20px; left: 20px; width: 250px;
        background: rgba(0, 0, 0, 0.8); border: 1px solid var(--accent);
        padding: 15px; border-radius: 10px; font-size: 0.8rem; text-align: left;
        backdrop-filter: blur(5px); opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }

    #rebirth-btn {
        margin-top: 20px; padding: 12px; background: var(--rebirth-color); color: white;
        border: none; border-radius: 8px; cursor: pointer; font-family: var(--fira-font);
        font-weight: bold; width: 100%; transition: 0.3s;
    }
    #rebirth-btn:disabled { background: #333; opacity: 0.5; cursor: not-allowed; }

    #stats-panel {
        background: rgba(0, 0, 0, 0.8); border-top: 1px solid var(--glass-border);
        height: 120px; display: flex; justify-content: space-around; align-items: center;
    }
    .stat-box span { color: var(--accent); font-weight: bold; font-size: 1.4rem; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
</style>
</head>
<body>

<div id="snow-container"></div>

<div id="game-layout">
    <div id="main-content">
        <div id="info-box">Hover an upgrade for info...</div>
        <div class="header-group">
            <h1>TRENTON ASCENDED</h1>
            <div class="rebirth-stat" id="rebirth-mult">Rebirth Multiplier: 1.0x</div>
        </div>
        <img id="clickable-image" src="https://lh3.googleusercontent.com/a-/ALV-UjXi81K-KPYiR-v80hz3zt2OidSJgCqq13shIWrh3yzXcUt-ClaL=s512-w512-h512-c-k-no" alt="Trenton" onclick="Game.click(event)">
        <div id="score-container">0 Power</div>
        <div style="width: 250px;">
            <button id="rebirth-btn" onclick="Game.rebirth()" disabled>REBIRTH (100K)</button>
        </div>
    </div>
    <div id="upgrades-panel"></div>
</div>

<div id="stats-panel">
    <div class="stat-box"><label>CPS</label><br><span id="st-cps">0</span></div>
    <div class="stat-box"><label>CPC</label><br><span id="st-cpc">1</span></div>
    <div class="stat-box"><label>CRIT</label><br><span id="st-crit">5%</span></div>
</div>

<script>
    const Game = (() => {
        let score = 0;
        let tCps = 0, tCpc = 1, rebirths = 0, crit = 0.05;
        const suffixes = ["", "K", "M", "B", "T", "Qa", "Qi", "Sx"];

        const format = (n) => {
            if (n < 1000) return Math.floor(n);
            const e = Math.floor(Math.log10(n) / 3);
            return (n / Math.pow(10, e * 3)).toFixed(2) + suffixes[e];
        };

        const upData = [
            { id: 'm', n: 'Mass Gain', d: '+1 CPS', cps: 1, cpc: 0, c: 10, s: 1.2 },
            { id: 's', n: 'Strength Gain', d: '+3 CPC', cps: 0, cpc: 3, c: 50, s: 1.25 },
            { id: 'sh', n: 'Shit Power', d: '+5 CPS / +5 CPC', cps: 5, cpc: 5, c: 200, s: 1.3 },
            { id: 'n', n: 'Neural Overclock', d: '+25 CPS', cps: 25, cpc: 0, c: 1000, s: 1.35 },
            { id: 'cr', n: 'Focus Training', d: '+3% Crit Chance', cps: 0, cpc: 0, cr: 0.03, c: 3000, s: 1.4 },
            { id: 'q', n: 'Quantum Biceps', d: '+60 CPC', cps: 0, cpc: 60, c: 8000, s: 1.4 },
            { id: 'g', n: 'Gravity Pull', d: '+200 CPS', cps: 200, cpc: 0, c: 20000, s: 1.45 },
            { id: 'nb', n: 'Nanobot Blood', d: '+500 CPS/CPC', cps: 500, cpc: 500, c: 75000, s: 1.5 },
            { id: 'cy', n: 'Cyber Spine', d: '+2K CPS', cps: 2000, cpc: 0, c: 250000, s: 1.5 },
            { id: 'v', n: 'Void Lung', d: '+5K CPC', cps: 0, cpc: 5000, c: 1000000, s: 1.55 },
            { id: 'sol', n: 'Solar Synth', d: '+25K CPS', cps: 25000, cpc: 0, c: 5000000, s: 1.6 }
        ];

        const panel = document.getElementById('upgrades-panel');
        const info = document.getElementById('info-box');

        upData.forEach((u, i) => {
            const card = document.createElement('div');
            card.className = 'upgrade-card disabled';
            card.id = `up-${u.id}`;
            card.innerHTML = `<div class="upgrade-title"><span>${u.n}</span> <span id="l-${u.id}">0</span></div><div class="upgrade-cost">Cost: <span id="c-${u.id}">${format(u.c)}</span></div>`;
            card.onclick = () => buy(i);
            card.onmouseenter = () => { info.style.opacity = 1; info.innerHTML = `<strong>${u.n}</strong><br>${u.d}<br><br>Level: ${u.lvl}`; };
            card.onmouseleave = () => { info.style.opacity = 0; };
            u.lvl = 0; u.baseC = u.c;
            panel.appendChild(card);
        });

        const buy = (i) => {
            const u = upData[i];
            if (score >= u.c) {
                score -= u.c; u.lvl++;
                if(u.cps) tCps += u.cps; if(u.cpc) tCpc += u.cpc; if(u.cr) crit += u.cr;
                u.c *= u.s; refresh();
            }
        };

        const refresh = () => {
            const m = 1 + (rebirths * 0.5);
            document.getElementById('score-container').innerText = format(score) + " Power";
            document.getElementById('st-cps').innerText = format(tCps * m);
            document.getElementById('st-cpc').innerText = format(tCpc * m);
            document.getElementById('st-crit').innerText = Math.round(crit * 100) + "%";
            document.getElementById('rebirth-mult').innerText = `Multiplier: ${m.toFixed(1)}x (Rebirths: ${rebirths})`;

            upData.forEach(u => {
                document.getElementById(`c-${u.id}`).innerText = format(u.c);
                document.getElementById(`l-${u.id}`).innerText = u.lvl;
                score >= u.c ? document.getElementById(`up-${u.id}`).classList.remove('disabled') : document.getElementById(`up-${u.id}`).classList.add('disabled');
            });

            const rBtn = document.getElementById('rebirth-btn');
            rBtn.disabled = score < 100000;
        };

        setInterval(() => { score += (tCps * (1 + rebirths * 0.5)) / 10; refresh(); }, 100);

        return {
            click: () => { score += tCpc * (1 + rebirths * 0.5) * (Math.random() < crit ? 5 : 1); refresh(); },
            rebirth: () => {
                if (score >= 100000) {
                    rebirths++; score = 0; tCps = 0; tCpc = 1; crit = 0.05;
                    upData.forEach(u => { u.lvl = 0; u.c = u.baseC; });
                    refresh();
                }
            }
        };
    })();

    const snow = document.getElementById('snow-container');
    for (let i = 0; i < 40; i++) {
        const f = document.createElement('div'); f.className = 'snowflake';
        f.style.cssText = `width:${Math.random()*4+2}px;height:${Math.random()*4+2}px;left:${Math.random()*100}%;animation-duration:${Math.random()*4+3}s;opacity:${Math.random()}`;
        snow.appendChild(f);
    }
</script>
</body>
</html>
