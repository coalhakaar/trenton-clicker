<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenton Ascended: Absolute Precision</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #020406;
        --accent: #00d2ff;
        --glass: rgba(255, 255, 255, 0.04);
        --glass-border: rgba(255, 255, 255, 0.1);
        --rebirth: #a29bfe;
        --success: #00ff88;
        --midas: #ffd700;
        --crit: #ff4757;
        --final: #ff00ff;
        --fira: 'Fira Code', monospace;
    }

    body, html { 
        margin: 0; padding: 0; height: 100%; font-family: var(--fira);
        background: var(--bg); color: #e6edf3; overflow: hidden;
    }

    #snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
    .flake { position: absolute; top: -10%; background: white; border-radius: 50%; animation: fall linear infinite; opacity: 0.2; }
    @keyframes fall { to { transform: translateY(110vh); } }

    .popup {
        position: absolute; font-weight: bold; pointer-events: none;
        z-index: 1000; animation: float-up 0.7s ease-out forwards;
        text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }
    @keyframes float-up {
        0% { transform: translate(-50%, 0) scale(1); opacity: 1; }
        100% { transform: translate(-50%, -150px) scale(1.2); opacity: 0; }
    }
    .crit-text { color: var(--crit); font-size: 2rem; filter: drop-shadow(0 0 12px var(--crit)); }
    .normal-text { color: var(--accent); font-size: 1.2rem; }

    #game { display: grid; grid-template-columns: 1fr 460px; height: 100vh; }
    #main { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding-bottom: 80px; }
    h1 { font-size: 1.8rem; color: var(--accent); letter-spacing: 4px; margin-bottom: 15px; text-align: center; }
    
    #trenton {
        width: 240px; height: 240px; border-radius: 50%; object-fit: cover;
        border: 3px solid var(--accent); cursor: pointer; transition: 0.05s;
        box-shadow: 0 0 40px rgba(0, 210, 255, 0.1); user-select: none;
    }
    #trenton:active { transform: scale(0.92); filter: brightness(1.5); }

    #score-box { 
        background: var(--glass); border: 1px solid var(--glass-border); padding: 12px 30px;
        margin-top: 25px; border-radius: 60px; font-size: 2.5rem; backdrop-filter: blur(15px);
        min-width: 240px; text-align: center;
    }

    #sidebar-header { display: flex; border-bottom: 1px solid var(--glass-border); background: #000; }
    .tab-btn { 
        flex: 1; padding: 15px; border: none; background: transparent; color: #666; 
        cursor: pointer; font-family: var(--fira); font-weight: bold; font-size: 0.8rem;
    }
    .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); background: var(--glass); }
    .tab-btn.rebirth-tab.active { color: var(--rebirth); border-bottom-color: var(--rebirth); }

    #shop-container { 
        background: rgba(0,0,0,0.6); border-left: 1px solid var(--glass-border); 
        display: flex; flex-direction: column; overflow: hidden;
    }
    #shop-list { padding: 20px; overflow-y: scroll; display: flex; flex-direction: column; gap: 10px; height: 100%; }

    .card {
        background: var(--glass); border: 1px solid var(--glass-border);
        padding: 14px; border-radius: 10px; cursor: pointer; transition: 0.2s;
        position: relative; display: flex; flex-direction: column; gap: 3px;
    }
    .card:hover:not(.locked) { background: rgba(255,255,255,0.08); transform: translateX(-5px); }
    .card.is-midas { border-color: var(--midas); }
    .card.is-final { border-color: var(--final); box-shadow: 0 0 15px var(--final); }
    .card.is-rebirth-perk { border-color: var(--rebirth); }
    .card.locked { opacity: 0.15; cursor: not-allowed; filter: grayscale(1); }

    .u-title { font-weight: bold; color: var(--accent); font-size: 0.9rem; }
    .u-cost { color: #fff; font-size: 0.85rem; font-weight: bold; margin-top: 3px; }
    .u-benefit { font-size: 0.75rem; color: var(--success); font-weight: bold; }
    .u-lvl-badge { position: absolute; top: 10px; right: 10px; font-size: 0.6rem; color: #555; }

    #stats { 
        position: fixed; bottom: 0; left: 0; width: calc(100% - 460px); height: 90px;
        background: rgba(0,0,0,0.9); border-top: 1px solid var(--glass-border);
        display: flex; justify-content: space-around; align-items: center;
    }
    .stat span { color: var(--accent); font-weight: bold; font-size: 1.2rem; }

    #rebirth-section { width: 300px; margin-top: 20px; }
    #rebirth-btn {
        width: 100%; padding: 14px; background: var(--rebirth); border: none; border-radius: 8px;
        color: white; font-family: var(--fira); font-weight: bold; cursor: pointer;
    }
    #rebirth-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--accent); }
</style>
</head>
<body>

<div id="snow"></div>

<div id="game">
    <div id="main">
        <h1>TRENTON ASCENDED</h1>
        <img id="trenton" src="https://lh3.googleusercontent.com/a-/ALV-UjXi81K-KPYiR-v80hz3zt2OidSJgCqq13shIWrh3yzXcUt-ClaL=s512-w512-h512-c-k-no" alt="Trenton" onclick="App.click(event)">
        <div id="score-box">0</div>
        
        <div id="rebirth-section">
            <button id="rebirth-btn" onclick="App.rebirth()" disabled>REBIRTH (+0)</button>
            <div style="text-align: center; font-size: 0.7rem; color: var(--rebirth); margin-top: 8px;" id="rb-status">0 Rebirths</div>
        </div>
    </div>

    <div id="shop-container">
        <div id="sidebar-header">
            <button class="tab-btn active" id="tab-upgrades" onclick="App.setTab('upgrades')">UPGRADES</button>
            <button class="tab-btn rebirth-tab" id="tab-rebirth" onclick="App.setTab('rebirth')">PERKS (0 RB)</button>
        </div>
        <div id="shop-list"></div>
    </div>
</div>

<div id="stats">
    <div class="stat"><label style="font-size:0.6rem; color:#444; display:block">CPS</label><span id="st-cps">0</span></div>
    <div class="stat"><label style="font-size:0.6rem; color:#444; display:block">CPC</label><span id="st-cpc">1</span></div>
    <div class="stat"><label style="font-size:0.6rem; color:#444; display:block">CRIT</label><span id="st-crit">5%</span></div>
</div>

<script>
    const App = (() => {
        const SAVE_KEY = 'trenton_ascended_stable_v1';
        const suffixes = ["", "K", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc", "UDe", "DDe", "TDe", "QdDe", "QnDe", "SxDe", "SpDe", "OcDe", "NoDe", "Vg"];
        
        // SORTED BY PRICE ASCENDING
        const baseUpgrades = [
            { id: 'm', n: 'Mass Gain', b: '+1 CPS', cps: 1, c: 10, s: 1.15 },
            { id: 's', n: 'Strength Training', b: '+3 CPC', cpc: 3, c: 50, s: 1.18 },
            { id: 'sh', n: 'Bio-Power', b: '+10 CPS / +5 CPC', cps: 10, cpc: 5, c: 250, s: 1.22 },
            { id: 'n', n: 'Neural Pulse', b: '+45 CPS', cps: 45, c: 1500, s: 1.25 },
            { id: 'cr', n: 'Focus Aura', b: '+3% Crit (Soft Cap 50%)', cr: 0.03, c: 5000, s: 1.3 },
            { id: 'q', n: 'Quantum Lift', b: '+120 CPC', cpc: 120, c: 18000, s: 1.28 },
            { id: 'g', n: 'Gravity Well', b: '+600 CPS', cps: 600, c: 75000, s: 1.3 },
            { id: 'nb', n: 'Nano-Repair', b: '+2K CPS / +1K CPC', cps: 2000, cpc: 1000, c: 300000, s: 1.32 },
            { id: 'cy', n: 'Cyber Frame', b: '+10K CPS', cps: 10000, c: 1500000, s: 1.35 },
            { id: 'v', n: 'Void Breath', b: '+50K CPC', cpc: 50000, c: 15000000, s: 1.38 },
            { id: 'sl', n: 'Solar Synthesis', b: '+150K CPS', cps: 150000, c: 80000000, s: 1.4 },
            { id: 'ga', n: 'Galaxy Mind', b: '+3M CPS', cps: 3000000, c: 1000000000, s: 1.42 },
            { id: 'ti', n: 'Time Warp', b: '+20M CPC', cpc: 20000000, c: 80000000000, s: 1.45 },
            { id: 'cb', n: 'Chrono-Buffer', b: '+80M CPC', cpc: 80000000, c: 600000000000, s: 1.45 },
            { id: 'dt', n: 'Dimensional Tear', b: '+300M CPS', cps: 300000000, c: 5000000000000, s: 1.48 },
            { id: 'af', n: 'Antimatter Forge', b: '+2B CPS', cps: 2000000000, c: 80000000000000, s: 1.5 },
            { id: 'nc', n: 'Neutron Core', b: '+10B CPC', cpc: 10000000000, c: 1000000000000000, s: 1.52 },
            { id: 'eh', n: 'Event Horizon', b: '+150B CPS', cps: 150000000000, c: 25000000000000000, s: 1.55 },
            { id: 'dm', n: 'Dark Infusion', b: '+800B CPS', cps: 800000000000, c: 600000000000000000, s: 1.55 },
            { id: 'uc', n: 'Universal Constant', b: '+4T CPC', cpc: 4000000000000, c: 12000000000000000000, s: 1.58 },
            { id: 'cbg', n: 'Cosmic Background', b: '+50T CPS', cps: 50000000000000, c: 300000000000000000000, s: 1.6 },
            { id: 'ta', n: 'The Great Attractor', b: '+400T CPS', cps: 400000000000000, c: 8000000000000000000000, s: 1.62 },
            { id: 'me', n: 'Multiversal Engine', b: '+5Qa CPC', cpc: 5000000000000000, c: 1.5e23, s: 1.65 },
            { id: 'sg', n: 'The Singularity', b: '+100Qa CPS', cps: 100000000000000000, c: 4e25, s: 1.7 },
            { id: 'ap', n: 'Absolute Precision', b: '100% CRIT RATE', ap: true, c: 1e26, s: 10, isFinal: true },
            { id: 'mi', n: 'Midas Touch', b: '3x Total Power', midas: 3, c: 1e27, s: 10, isMidas: true }
        ];

        const rebirthUpgrades = [
            { id: 'rb_mult', n: 'Ascension Might', b: '+50% Rebirth Power', pmult: 0.5, c: 1 },
            { id: 'rb_crit', n: 'Lucky Soul', b: '+10% Base Crit', pcrit: 0.10, c: 5 },
            { id: 'rb_speed', n: 'Time Flow', b: '+20% Extra CPS', pspeed: 0.20, c: 20 },
            { id: 'rb_god', n: 'God Finger', b: '2x Click Power', pclick: 1, c: 100 }
        ];

        let state = {
            score: 0, cps: 0, cpc: 1, rebirths: 0, currentRB: 0, crit: 0.05, 
            rebirthCost: 100000, midasMult: 1, currentTab: 'upgrades',
            hasAP: false,
            upgrades: baseUpgrades.map(u => ({...u, lvl: 0})),
            perks: rebirthUpgrades.map(p => ({...p, lvl: 0}))
        };

        const format = (n) => {
            if (n < 1000) return Math.floor(n);
            const e = Math.floor(Math.log10(n) / 3);
            if (e >= suffixes.length) return n.toExponential(2);
            return (n / Math.pow(10, e * 3)).toFixed(2) + suffixes[e];
        };

        const save = () => localStorage.setItem(SAVE_KEY, JSON.stringify(state));

        const load = () => {
            const raw = localStorage.getItem(SAVE_KEY);
            if (raw) {
                const saved = JSON.parse(raw);
                state.upgrades.forEach(u => {
                    const savedU = saved.upgrades.find(su => su.id === u.id);
                    if (savedU) { u.lvl = savedU.lvl; u.c = savedU.c; }
                });
                state.perks.forEach(p => {
                    const savedP = (saved.perks || []).find(sp => sp.id === p.id);
                    if (savedP) { p.lvl = savedP.lvl; }
                });
                state.score = saved.score || 0;
                state.cps = saved.cps || 0;
                state.cpc = saved.cpc || 1;
                state.rebirths = saved.rebirths || 0;
                state.currentRB = saved.currentRB || 0;
                state.hasAP = saved.hasAP || false;
                state.crit = saved.hasAP ? 1 : Math.min(saved.crit || 0.05, 0.5);
                state.rebirthCost = saved.rebirthCost || 100000;
                state.midasMult = saved.midasMult || 1;
            }
        };

        const renderShop = () => {
            const list = document.getElementById('shop-list'); list.innerHTML = '';
            const activeList = state.currentTab === 'upgrades' ? state.upgrades : state.perks;
            
            activeList.forEach((u, i) => {
                const card = document.createElement('div');
                card.className = `card ${u.isMidas ? 'is-midas' : ''} ${u.isFinal ? 'is-final' : ''} ${state.currentTab === 'rebirth' ? 'is-rebirth-perk' : ''}`;
                card.id = `item-${u.id}`;
                card.onclick = () => state.currentTab === 'upgrades' ? buyUpgrade(i) : buyPerk(i);
                card.innerHTML = `
                    <div class="u-lvl-badge">LVL ${u.lvl}</div>
                    <div class="u-title">${u.n}</div>
                    <div class="u-benefit">${u.b}</div>
                    <div class="u-cost">Cost: ${state.currentTab === 'upgrades' ? format(u.c) : u.c + ' RB'}</div>
                `;
                list.appendChild(card);
            });
            refresh();
        };

        const buyUpgrade = (i) => {
            const u = state.upgrades[i];
            if (state.score >= u.c) {
                state.score -= u.c; u.lvl++;
                if (u.cps) state.cps += u.cps; 
                if (u.cpc) state.cpc += u.cpc; 
                if (u.ap) { state.hasAP = true; state.crit = 1; }
                if (u.cr && !state.hasAP) state.crit = Math.min(state.crit + u.cr, 0.5);
                if (u.midas) state.midasMult *= u.midas;
                u.c *= u.s; refresh(); save();
            }
        };

        const buyPerk = (i) => {
            const p = state.perks[i];
            if (state.currentRB >= p.c) {
                state.currentRB -= p.c; p.lvl++; refresh(); save();
            }
        };

        const refresh = () => {
            const rbPowMult = 1 + (state.perks.find(p => p.id === 'rb_mult').lvl * 0.5);
            const pClickMult = 1 + (state.perks.find(p => p.id === 'rb_god').lvl * 1);
            const pCpsMult = 1 + (state.perks.find(p => p.id === 'rb_speed').lvl * 0.2);
            const pCritBase = (state.perks.find(p => p.id === 'rb_crit').lvl * 0.1);

            const mult = (1 + (state.rebirths * 0.7 * rbPowMult)) * state.midasMult;
            
            document.getElementById('score-box').innerText = format(state.score);
            document.getElementById('st-cps').innerText = format(state.cps * mult * pCpsMult);
            document.getElementById('st-cpc').innerText = format(state.cpc * mult * pClickMult);
            
            const displayCrit = state.hasAP ? 1 : Math.min(state.crit + pCritBase, 0.5);
            document.getElementById('st-crit').innerText = Math.round(displayCrit * 100) + "%";
            
            document.getElementById('rb-status').innerText = `${state.rebirths} Total Rebirths`;
            document.getElementById('tab-rebirth').innerText = `PERKS (${state.currentRB} RB)`;

            let possible = 0, next = state.rebirthCost, temp = state.score;
            while(temp >= next && possible < 1000) { temp -= next; next *= 1.7; possible++; }
            document.getElementById('rebirth-btn').innerText = `REBIRTH (+${possible})`;
            document.getElementById('rebirth-btn').disabled = possible === 0;

            const activeList = state.currentTab === 'upgrades' ? state.upgrades : state.perks;
            activeList.forEach(u => {
                const el = document.getElementById(`item-${u.id}`);
                if (el) {
                    const afford = state.currentTab === 'upgrades' ? state.score >= u.c : state.currentRB >= u.c;
                    afford ? el.classList.remove('locked') : el.classList.add('locked');
                }
            });
        };

        load();

        setInterval(() => {
            const rbPowMult = 1 + (state.perks.find(p => p.id === 'rb_mult').lvl * 0.5);
            const pCpsMult = 1 + (state.perks.find(p => p.id === 'rb_speed').lvl * 0.2);
            const mult = (1 + (state.rebirths * 0.7 * rbPowMult)) * state.midasMult;
            state.score += (state.cps * mult * pCpsMult) / 10; refresh();
        }, 100);

        return {
            click: (e) => {
                const rbPowMult = 1 + (state.perks.find(p => p.id === 'rb_mult').lvl * 0.5);
                const pClickMult = 1 + (state.perks.find(p => p.id === 'rb_god').lvl * 1);
                const pCritBase = (state.perks.find(p => p.id === 'rb_crit').lvl * 0.1);
                const mult = (1 + (state.rebirths * 0.7 * rbPowMult)) * state.midasMult;
                const finalCrit = state.hasAP ? 1 : Math.min(state.crit + pCritBase, 0.5);
                const isCrit = Math.random() < finalCrit;
                const gain = state.cpc * mult * pClickMult * (isCrit ? 5 : 1);
                state.score += gain; 
                const p = document.createElement('div'); p.className = `popup ${isCrit ? 'crit-text' : 'normal-text'}`;
                p.style.left = e.pageX + 'px'; p.style.top = e.pageY + 'px';
                p.innerText = (isCrit ? 'CRIT! ' : '+') + format(gain);
                document.body.appendChild(p); setTimeout(() => p.remove(), 700);
                refresh();
            },
            rebirth: () => {
                let count = 0, next = state.rebirthCost;
                while(state.score >= next) { state.score -= next; next *= 1.7; count++; }
                if (count > 0) {
                    state.rebirths += count; state.currentRB += count; state.rebirthCost = next;
                    state.score = 0; state.cps = 0; state.cpc = 1; state.crit = 0.05; state.midasMult = 1; state.hasAP = false;
                    state.upgrades.forEach(u => { u.lvl = 0; u.c = baseUpgrades.find(b => b.id === u.id).c; });
                    save(); renderShop();
                }
            },
            setTab: (t) => {
                state.currentTab = t;
                document.getElementById('tab-upgrades').classList.toggle('active', t === 'upgrades');
                document.getElementById('tab-rebirth').classList.toggle('active', t === 'rebirth');
                renderShop();
            },
            init: () => { renderShop(); }
        };
    })();

    window.onload = () => App.init();
    
    const snow = document.getElementById('snow');
    for (let i = 0; i < 30; i++) {
        const f = document.createElement('div'); f.className = 'flake';
        f.style.cssText = `width:${Math.random()*3+2}px;height:${Math.random()*3+2}px;left:${Math.random()*100}%;animation-duration:${Math.random()*4+3}s;`;
        snow.appendChild(f);
    }
</script>
</body>
</html>
