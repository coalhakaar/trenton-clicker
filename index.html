<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenton Ascended: Cyber-Audio Expansion</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg:#020406; --accent:#00d2ff; --glass:rgba(255,255,255,0.04);
    --glass-border:rgba(255,255,255,0.08); --rebirth:#a29bfe;
    --success:#00ff88; --midas:#ffd700; --crit:#ff4757;
    --fira:'Fira Code', monospace; --sidebar-w:480px;
}
*{box-sizing:border-box}
body,html{margin:0;height:100%;font-family:var(--fira);background:var(--bg);color:#e6edf3;overflow:hidden}

#game{display:grid;grid-template-columns:1fr var(--sidebar-w);height:100vh}

#main{display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:100px}
h1{font-size:1.4rem;color:var(--accent);letter-spacing:5px;margin-bottom:20px;text-transform:uppercase}

#trenton{width:260px;height:260px;border-radius:50%;border:4px solid var(--accent);cursor:pointer}
#trenton:active{transform:scale(0.94)}

.ripple{position:absolute;border-radius:50%;border:2px solid var(--accent);animation:ripple 0.6s forwards}
.ripple.is-crit{border-color:var(--crit)}
@keyframes ripple{to{width:160px;height:160px;opacity:0}}

#score-box{margin-top:20px;font-size:3rem}

#music-btn{position:fixed;top:20px;left:20px}
#wipe-btn{position:fixed;top:20px;right:520px}

#shop-container{background:#05070a;border-left:1px solid #222;display:flex;flex-direction:column}
#shop-list{padding:20px;overflow:auto;flex:1}

.card{background:#111;padding:15px;border:1px solid #333;margin-bottom:10px;cursor:pointer}
.card.locked{opacity:.3}

#stats{position:fixed;bottom:0;left:0;width:calc(100% - 480px);height:90px;background:#000;display:flex;justify-content:space-around;align-items:center}
</style>
</head>
<body>

<div id="game">
<button id="music-btn" onclick="App.toggleMusic()">♪ MUSIC OFF</button>
<button id="wipe-btn" onclick="if(confirm('wipe?')) App.wipeSave()">WIPE</button>

<div id="main">
<h1>TRENTON ASCENDED</h1>
<img id="trenton" onclick="App.click(event)" src="https://lh3.googleusercontent.com/a-/ALV-UjXi81K-KPYiR-v80hz3zt2OidSJgCqq13shIWrh3yzXcUt-ClaL=s512">
<div id="score-box">0</div>
<button id="rebirth-btn" onclick="App.rebirth()">REBIRTH</button>
</div>

<div id="shop-container">
<div id="shop-list"></div>
</div>
</div>

<div id="stats">
<div><label>CPS</label><span id="st-cps">0</span></div>
<div><label>CPC</label><span id="st-cpc">1</span></div>
<div><label>CRIT</label><span id="st-crit">5%</span></div>
<div><label>MULTI</label><span id="st-mult">×1</span></div>
</div>

<script>
const App = (() => {

const BASE_UPGRADES = [
{n:'Muscle Fiber',type:'CPC',p:1,c:15,s:1.15},
{n:'Auto Clicker',type:'CPS',p:1,c:100,s:1.16},
{n:'Hybrid Vigor',type:'BOTH',p:5,c:500,s:1.2}
];

let S = {score:0,cps:0,cpc:1,crit:0.05,rebirths:0,mult:1,upgrades:BASE_UPGRADES.map(u=>({lvl:0,c:u.c}))};

const fmt=n=>n<1e3?Math.floor(n):n.toExponential(2);

function getStats(){
let mult=1+S.rebirths;
return {cpc:S.cpc*mult,cps:S.cps*mult};
}

function refresh(){
let st=getStats();
score-box.innerText=fmt(S.score);
st-cps.innerText=fmt(st.cps);
st-cpc.innerText=fmt(st.cpc);

const base=5e5;
let temp=S.score;
let cost=base*Math.pow(1.6,S.rebirths);
let rb=0;

while(temp>=cost){
temp-=cost;
rb++;
cost*=1.6;
}

rebirth-btn.innerText=`REBIRTH (+${rb})`;
}

function render(){
shop-list.innerHTML='';
BASE_UPGRADES.forEach((u,i)=>{
let div=document.createElement('div');
div.className='card';
div.innerHTML=`
<b>${u.n}</b><br>
Type: ${u.type==='BOTH'?'CPC & CPS':u.type}<br>
Lvl: ${S.upgrades[i].lvl}<br>
Cost: ${fmt(S.upgrades[i].c)}
`;
div.onclick=()=>buy(i);
shop-list.appendChild(div);
});
refresh();
}

function buy(i){
let u=BASE_UPGRADES[i];
let s=S.upgrades[i];
if(S.score<s.c)return;

S.score-=s.c;
s.lvl++;
if(u.type==='CPC'||u.type==='BOTH')S.cpc+=u.p;
if(u.type==='CPS'||u.type==='BOTH')S.cps+=u.p;
s.c*=u.s;

render();
}

return{

click:e=>{
let st=getStats();
let gain=st.cpc;
S.score+=gain;
refresh();
},

rebirth:()=>{
const base=5e5;
let temp=S.score;
let cost=base*Math.pow(1.6,S.rebirths);
let rb=0;

while(temp>=cost){
temp-=cost;
rb++;
cost*=1.6;
}

if(rb>0){
S.rebirths+=rb;
S.score=temp;
S.cps=0;
S.cpc=1;
S.upgrades.forEach((u,i)=>{
u.lvl=0;
u.c=BASE_UPGRADES[i].c;
});
render();
}
},

toggleMusic:()=>{
if(window.audio){
window.audio.close();
window.audio=null;
music-btn.innerText="♪ MUSIC OFF";
return;
}

let ctx=new AudioContext();
window.audio=ctx;

let gain=ctx.createGain();
gain.gain.value=0.2;
gain.connect(ctx.destination);

let notes=[220,261,293,329];
let i=0;

window.loop=setInterval(()=>{
let osc=ctx.createOscillator();
osc.frequency.value=notes[i%notes.length];
osc.connect(gain);
osc.start();
osc.stop(ctx.currentTime+0.2);
i++;
},200);

music-btn.innerText="♪ MUSIC ON";
},

wipeSave:()=>location.reload(),

init:()=>{
render();
setInterval(()=>{
S.score+=getStats().cps/10;
refresh();
},100);
}

};

})();

window.onload=()=>App.init();
</script>
</body>
</html>
