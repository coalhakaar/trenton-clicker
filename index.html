<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenton Ascended: Finalized</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #020406; --accent: #00d2ff; --glass: rgba(255,255,255,0.04);
        --glass-border: rgba(255,255,255,0.08); --rebirth: #a29bfe;
        --success: #00ff88; --midas: #ffd700; --crit: #ff4757;
        --final: #ff00ff; --fira: 'Fira Code', monospace;
        --sidebar-w: 420px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; height: 100%; font-family: var(--fira); background: var(--bg); color: #e6edf3; overflow: hidden; }

    /* SNOW */
    #snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
    .flake { position: absolute; top: -10%; background: white; border-radius: 50%; animation: fall linear infinite; opacity: 0.12; }
    @keyframes fall { to { transform: translateY(110vh); } }

    /* LAYOUT */
    #game { display: grid; grid-template-columns: 1fr var(--sidebar-w); height: 100vh; }

    /* LEFT PANEL */
    #main { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding-bottom: 90px; }
    h1 { font-size: 1.4rem; color: var(--accent); letter-spacing: 5px; margin-bottom: 16px; text-align: center; text-shadow: 0 0 30px rgba(0,210,255,0.5); }

    #click-wrap { position: relative; display: inline-block; }
    #trenton {
        width: 200px; height: 200px; border-radius: 50%; object-fit: cover;
        border: 3px solid var(--accent); cursor: pointer;
        box-shadow: 0 0 60px rgba(0,210,255,0.18); user-select: none; display: block;
        transition: transform 0.05s, filter 0.05s;
    }
    #trenton:active { transform: scale(0.92); filter: brightness(1.5); }

    .ripple {
        position: absolute; border-radius: 50%; pointer-events: none;
        animation: ripple-anim 0.6s ease-out forwards;
        border: 2px solid var(--accent); transform: translate(-50%, -50%) scale(0);
    }
    .ripple.crit { border-color: var(--crit); border-width: 3px; box-shadow: 0 0 14px var(--crit); }
    @keyframes ripple-anim {
        0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(5); opacity: 0; }
    }

    #score-box {
        background: var(--glass); border: 1px solid var(--glass-border); padding: 10px 30px;
        margin-top: 20px; border-radius: 60px; font-size: 2.2rem;
        backdrop-filter: blur(15px); min-width: 240px; text-align: center;
    }

    #rebirth-section { width: 280px; margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
    #rebirth-btn {
        width: 100%; padding: 12px; background: linear-gradient(135deg, var(--rebirth), #6c5ce7);
        border: none; border-radius: 8px; color: white; font-weight: bold; font-family: var(--fira);
        cursor: pointer; font-size: 0.8rem; transition: 0.2s; letter-spacing: 1px;
    }
    #rebirth-btn:hover:not(:disabled) { filter: brightness(1.2); transform: translateY(-1px); }
    #rebirth-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #rb-status { text-align: center; font-size: 0.6rem; color: var(--rebirth); letter-spacing: 1px; }

    #music-btn {
        position: fixed; top: 14px; left: 14px; z-index: 200;
        background: rgba(0,0,0,0.7); border: 1px solid #222;
        color: #666; padding: 7px 14px; border-radius: 6px; font-family: var(--fira);
        font-size: 0.65rem; cursor: pointer; transition: 0.2s;
    }
    #music-btn.playing { color: var(--success); border-color: var(--success); }

    /* STATS BAR */
    #stats {
        position: fixed; bottom: 0; left: 0; width: calc(100% - var(--sidebar-w)); height: 85px;
        background: rgba(0,0,0,0.95); border-top: 1px solid var(--glass-border);
        display: flex; justify-content: space-around; align-items: center;
    }
    .stat { text-align: center; }
    .stat label { font-size: 0.5rem; color: #444; display: block; letter-spacing: 2px; margin-bottom: 4px; }
    .stat span { font-size: 0.95rem; font-weight: 700; }

    /* SIDEBAR */
    #shop-container { background: rgba(0,0,0,0.7); border-left: 1px solid var(--glass-border); display: flex; flex-direction: column; overflow: hidden; }
    #sidebar-header { display: flex; flex-direction: column; border-bottom: 1px solid var(--glass-border); background: #000; }
    .tabs { display: flex; }
    .tab-btn {
        flex: 1; padding: 14px; border: none; background: transparent; color: #444;
        cursor: pointer; font-family: var(--fira); font-weight: 700; font-size: 0.7rem;
        transition: 0.2s; border-bottom: 2px solid transparent;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    #buy-mult-strip {
        display: flex; background: #080808; padding: 4px; gap: 4px; border-top: 1px solid #111;
    }
    .mult-btn {
        flex: 1; padding: 6px; font-size: 0.6rem; background: #111; border: 1px solid #222;
        color: #444; cursor: pointer; border-radius: 4px; font-family: var(--fira);
    }
    .mult-btn.active { background: #222; color: var(--accent); border-color: var(--accent); }

    #shop-list { padding: 12px; overflow-y: scroll; display: flex; flex-direction: column; gap: 8px; flex: 1; }

    /* UPGRADE CARDS */
    .card {
        border-radius: 8px; cursor: pointer; transition: 0.15s;
        position: relative; overflow: hidden; background: #0a0e13; border: 1px solid #1a2030;
    }
    .card:hover:not(.locked) { transform: translateX(4px); border-color: var(--accent); }
    .card.locked { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }
    
    .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); }
    .card.is-midas::before { background: var(--midas); }
    .card.is-final::before { background: var(--final); }
    .card.is-perk::before  { background: var(--rebirth); }

    .card-inner { padding: 10px 14px 10px 18px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .card-name { font-size: 0.85rem; font-weight: 700; color: #dde6f0; }
    .card-lvl { font-size: 0.6rem; font-weight: 700; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; color: #555; }

    .card-stats { display: flex; gap: 10px; background: rgba(0,0,0,0.4); padding: 6px 10px; border-radius: 5px; }
    .stat-chunk { display: flex; flex-direction: column; flex: 1; }
    .chunk-label { font-size: 0.45rem; color: #333; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
    .chunk-val { font-size: 0.75rem; font-weight: 700; }
    .chunk-val.boost { color: var(--success); }
    .chunk-val.cost { color: #ccc; }

    .popup { position: fixed; pointer-events: none; animation: float-up 0.75s forwards; font-weight: bold; font-family: var(--fira); font-size: 0.85rem; z-index: 999; }
    @keyframes float-up { to { transform: translateY(-90px); opacity: 0; } }
</style>
</head>
<body>
<div id="snow"></div>
<button id="music-btn" onclick="App.toggleMusic()">♪ MUSIC OFF</button>

<div id="game">
    <div id="main">
        <h1>TRENTON ASCENDED</h1>
        <div id="click-wrap">
            <img id="trenton" src="https://lh3.googleusercontent.com/a-/ALV-UjXi81K-KPYiR-v80hz3zt2OidSJgCqq13shIWrh3yzXcUt-ClaL=s512-w512-h512-c-k-no" alt="Trenton" onclick="App.click(event)">
        </div>
        <div id="score-box">0</div>
        <div id="rebirth-section">
            <button id="rebirth-btn" onclick="App.rebirth()" disabled>REBIRTH (+0 RB)</button>
            <div id="rb-status">0 Rebirths | 0 RB Available</div>
        </div>
    </div>

    <div id="shop-container">
        <div id="sidebar-header">
            <div class="tabs">
                <button class="tab-btn active" id="tab-upgrades" onclick="App.setTab('upgrades')">UPGRADES</button>
                <button class="tab-btn" id="tab-rebirth" onclick="App.setTab('rebirth')">PERKS (0)</button>
            </div>
            <div id="buy-mult-strip">
                <button class="mult-btn active" onclick="App.setMult(1)">1X</button>
                <button class="mult-btn" onclick="App.setMult(10)">10X</button>
                <button class="mult-btn" onclick="App.setMult('MAX')">MAX</button>
            </div>
        </div>
        <div id="shop-list"></div>
    </div>
</div>

<div id="stats">
    <div class="stat"><label>CPS</label><span id="st-cps">0</span></div>
    <div class="stat"><label>CPC</label><span id="st-cpc">1</span></div>
    <div class="stat"><label>CRIT</label><span id="st-crit">5%</span></div>
    <div class="stat"><label>MULT</label><span id="st-mult">×1.00</span></div>
</div>

<script>
const App = (() => {
    const SAVE_KEY = 'trenton_asc_v4';
    const SFX = ["","K","M","B","T","Qa","Qi","Sx","Sp","Oc","No","Dc","UDc","DDc","TDc","Vg"];
    const fmt = n => {
        if (n < 1000) return Math.floor(n).toString();
        const e = Math.min(Math.floor(Math.log10(Math.abs(n)) / 3), SFX.length - 1);
        return (n / Math.pow(10, e * 3)).toFixed(2) + SFX[e];
    };

    const BASE_UPGRADES = [
        { id:'m', n:'Mass Gain', b:'+1 CPS', cps:1, c:10, s:1.15 },
        { id:'s', n:'Strength Training', b:'+3 CPC', cpc:3, c:50, s:1.18 },
        { id:'cr', n:'Focus Aura', b:'+3% Crit', cr:0.03, c:200, s:1.3 },
        { id:'sh', n:'Bio-Power', b:'+10 CPS', cps:10, c:800, s:1.22 },
        { id:'n', n:'Neural Pulse', b:'+40 CPS', cps:40, c:3000, s:1.25 },
        { id:'q', n:'Quantum Lift', b:'+100 CPC', cpc:100, c:20000, s:1.28 },
        { id:'g', n:'Gravity Well', b:'+500 CPS', cps:500, c:100000, s:1.3 },
        { id:'cy', n:'Cyber Frame', b:'+12K CPS', cps:12000, c:4e6, s:1.35 },
        { id:'v', n:'Void Breath', b:'+40K CPC', cpc:40000, c:2e7, s:1.38 },
        { id:'ga', n:'Galaxy Mind', b:'+2M CPS', cps:2e6, c:1e9, s:1.42 },
        { id:'ti', n:'Time Warp', b:'+15M CPC', cpc:15e6, c:1e10, s:1.45 },
        { id:'ap', n:'Precision', b:'100% CRIT', ap:true, c:1e22, s:10, isFinal:true },
        { id:'mi', n:'Midas Touch', b:'3× Power', midas:3, c:1e23, s:10, isMidas:true }
    ];

    const BASE_PERKS = [
        { id:'rb_cpc', n:'Iron Grip', b:'+50% CPC', c:1, maxLvl:20 },
        { id:'rb_cps', n:'Endless Flow', b:'+50% CPS', c:1, maxLvl:20 },
        { id:'rb_crit', n:'Lucky Soul', b:'+5% Crit', c:2, maxLvl:10 }
    ];

    let S = {
        score:0, cps:0, cpc:1, crit:0.05, rebirths:0, currentRB:0, rebirthCost:1e5,
        midasMult:1, hasAP:false, currentTab:'upgrades', buyMult:1,
        upgrades: BASE_UPGRADES.map(u => ({id:u.id, lvl:0, c:u.c})),
        perks: BASE_PERKS.map(p => ({id:p.id, lvl:0}))
    };

    let audioCtx=null, musicPlaying=false, stopFns=[];

    const getStats = () => {
        const lv = id => S.perks.find(p=>p.id===id)?.lvl||0;
        const rbMult = 1 + (S.rebirths * 0.6);
        const gMult = rbMult * S.midasMult;
        return {
            eCpc: S.cpc * gMult * (1 + lv('rb_cpc')*0.5),
            eCps: S.cps * gMult * (1 + lv('rb_cps')*0.5),
            crit: S.hasAP ? 1 : Math.min(S.crit + lv('rb_crit')*0.05, 0.5),
            gMult
        };
    };

    const refresh = () => {
        const st = getStats();
        document.getElementById('score-box').innerText = fmt(S.score);
        document.getElementById('st-cps').innerText = fmt(st.eCps);
        document.getElementById('st-cpc').innerText = fmt(st.eCpc);
        document.getElementById('st-crit').innerText = Math.round(st.crit*100)+'%';
        document.getElementById('st-mult').innerText = '×' + st.gMult.toFixed(2);
        document.getElementById('rb-status').innerText = `${S.rebirths} Rebirths | ${S.currentRB} RB Available`;
        document.getElementById('tab-rebirth').innerText = `PERKS (${S.currentRB})`;
        
        let rbG=0, cost=S.rebirthCost, t=S.score;
        while(t >= cost && rbG < 100) { t-=cost; cost*=1.8; rbG++; }
        document.getElementById('rebirth-btn').innerText = `REBIRTH (+${rbG} RB)`;
        document.getElementById('rebirth-btn').disabled = rbG === 0;

        const list = document.getElementById('shop-list');
        if (list.children.length === 0) renderShop();

        const activeList = S.currentTab === 'upgrades' ? S.upgrades : S.perks;
        activeList.forEach(u => {
            const el = document.getElementById('card-' + u.id);
            if (!el) return;
            const def = (S.currentTab === 'upgrades' ? BASE_UPGRADES : BASE_PERKS).find(x=>x.id===u.id);
            let cost = S.currentTab === 'upgrades' ? u.c : (def.c * (u.lvl+1));
            
            el.classList.toggle('locked', (S.currentTab==='upgrades' ? S.score : S.currentRB) < cost);
            el.querySelector('.cell-price').innerText = S.currentTab === 'upgrades' ? fmt(cost) : cost + ' RB';
            el.querySelector('.cell-bought').innerText = u.lvl + '×';
            el.querySelector('.card-lvl').innerText = 'LVL ' + u.lvl;
        });
    };

    const renderShop = () => {
        const list = document.getElementById('shop-list');
        list.innerHTML = '';
        const defs = S.currentTab === 'upgrades' ? BASE_UPGRADES : BASE_PERKS;
        defs.forEach((def, i) => {
            const u = (S.currentTab === 'upgrades' ? S.upgrades : S.perks).find(x=>x.id===def.id);
            const cls = def.isMidas ? 'is-midas' : def.isFinal ? 'is-final' : S.currentTab === 'rebirth' ? 'is-perk' : '';
            const card = document.createElement('div');
            card.className = `card ${cls}`;
            card.id = 'card-' + def.id;
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-header"><span class="card-name">${def.n}</span><span class="card-lvl">LVL ${u.lvl}</span></div>
                    <div class="card-stats">
                        <div class="stat-chunk"><span class="chunk-label">Benefit</span><span class="chunk-val boost">${def.b}</span></div>
                        <div class="stat-chunk"><span class="chunk-label">Cost</span><span class="chunk-val cost cell-price">0</span></div>
                        <div class="stat-chunk"><span class="chunk-label">Owned</span><span class="chunk-val cell-bought">0</span></div>
                    </div>
                </div>`;
            card.onclick = () => S.currentTab === 'upgrades' ? buyU(i) : buyP(i);
            list.appendChild(card);
        });
    };

    const buyU = i => {
        const def = BASE_UPGRADES[i], u = S.upgrades.find(x=>x.id===def.id);
        let count = S.buyMult === 'MAX' ? 100 : S.buyMult;
        for(let j=0; j<count; j++) {
            if (S.score < u.c) break;
            S.score -= u.c; u.lvl++;
            if(def.cps) S.cps += def.cps;
            if(def.cpc) S.cpc += def.cpc;
            if(def.ap) { S.hasAP=true; S.crit=1; }
            if(def.cr && !S.hasAP) S.crit = Math.min(S.crit + def.cr, 0.5);
            if(def.midas) S.midasMult *= def.midas;
            u.c *= def.s;
            if (S.buyMult !== 'MAX' && j === count-1) break;
        }
        refresh();
    };

    const buyP = i => {
        const def = BASE_PERKS[i], p = S.perks.find(x=>x.id===def.id);
        if(p.lvl >= def.maxLvl) return;
        const cost = def.c * (p.lvl+1);
        if(S.currentRB >= cost) { S.currentRB -= cost; p.lvl++; refresh(); }
    };

    const startMusic = () => {
        if (musicPlaying) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const master = audioCtx.createGain(); master.gain.value = 0.1; master.connect(audioCtx.destination);
        const mkO = (f, t) => {
            const o = audioCtx.createOscillator(); o.type = t; o.frequency.value = f;
            o.connect(master); o.start(); return o;
        };
        const p = [mkO(110, 'sine'), mkO(165, 'sine')];
        stopFns = [() => p.forEach(x => x.stop()), () => master.disconnect()];
        musicPlaying = true;
        document.getElementById('music-btn').className = 'playing';
        document.getElementById('music-btn').innerText = '♪ MUSIC ON';
    };

    return {
        click: e => {
            const st = getStats(), isCrit = Math.random() < st.crit;
            const gain = st.eCpc * (isCrit ? 5 : 1);
            S.score += gain;
            const r = document.createElement('div');
            r.className = 'ripple' + (isCrit ? ' crit' : '');
            r.style.left = e.clientX + 'px'; r.style.top = e.clientY + 'px';
            document.body.appendChild(r); setTimeout(() => r.remove(), 600);
            refresh();
        },
        setTab: t => { S.currentTab = t; renderShop(); refresh(); },
        setMult: m => { 
            S.buyMult = m; 
            document.querySelectorAll('.mult-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        },
        rebirth: () => {
            let rbG=0, cost=S.rebirthCost, t=S.score;
            while(t >= cost && rbG < 100) { t-=cost; cost*=1.8; rbG++; }
            if (rbG > 0) {
                S.rebirths += rbG; S.currentRB += rbG; S.score = 0; S.cps = 0; S.cpc = 1; S.midasMult = 1;
                S.upgrades.forEach(u => { const d = BASE_UPGRADES.find(x=>x.id===u.id); u.lvl=0; u.c=d.c; });
                renderShop(); refresh();
            }
        },
        toggleMusic: () => musicPlaying ? (stopFns.forEach(f=>f()), musicPlaying=false, document.getElementById('music-btn').innerText='♪ MUSIC OFF', document.getElementById('music-btn').className='') : startMusic(),
        init: () => { 
            for(let i=0; i<30; i++) {
                const f = document.createElement('div'); f.className='flake';
                f.style.cssText=`width:2px;height:2px;left:${Math.random()*100}%;animation-duration:${Math.random()*10+5}s;animation-delay:${Math.random()*5}s`;
                document.getElementById('snow').appendChild(f);
            }
            refresh(); 
        }
    };
})();
window.onload = () => App.init();
setInterval(() => { App.init; }, 100); // Internal ticker logic handled via state inside App
</script>
</body>
</html>
