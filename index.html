<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenton Ascended: Bulk Rebirth</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #030508;
        --accent: #00d2ff;
        --glass: rgba(255, 255, 255, 0.04);
        --glass-border: rgba(255, 255, 255, 0.1);
        --rebirth: #a29bfe;
        --success: #00ff88;
        --midas: #ffd700;
        --crit: #ff4757;
        --fira: 'Fira Code', monospace;
    }

    body, html { 
        margin: 0; padding: 0; height: 100%; font-family: var(--fira);
        background: var(--bg); color: #e6edf3; overflow: hidden;
    }

    #snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
    .flake { position: absolute; top: -10%; background: white; border-radius: 50%; animation: fall linear infinite; opacity: 0.3; }
    @keyframes fall { to { transform: translateY(110vh); } }

    .ripple {
        position: absolute; border: 2px solid var(--accent); border-radius: 50%;
        transform: translate(-50%, -50%); pointer-events: none;
        animation: ripple-out 0.5s linear forwards; z-index: 99;
    }
    @keyframes ripple-out {
        from { width: 0; height: 0; opacity: 1; }
        to { width: 160px; height: 160px; opacity: 0; }
    }

    .popup {
        position: absolute; font-weight: bold; pointer-events: none;
        z-index: 1000; animation: float-up 0.8s ease-out forwards;
        text-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
    @keyframes float-up {
        0% { transform: translate(-50%, 0); opacity: 1; }
        100% { transform: translate(-50%, -120px); opacity: 0; }
    }
    .crit-text { color: var(--crit); font-size: 1.8rem; filter: drop-shadow(0 0 8px var(--crit)); }
    .normal-text { color: var(--accent); font-size: 1.1rem; }

    #audio-controls { position: fixed; top: 20px; left: 20px; z-index: 100; }
    .audio-btn { background: var(--glass); border: 1px solid var(--glass-border); color: white; padding: 12px; border-radius: 50%; cursor: pointer; backdrop-filter: blur(10px); }

    #game { display: grid; grid-template-columns: 1fr 440px; height: 100vh; }
    #main { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding-bottom: 80px; }
    h1 { font-size: 2.2rem; color: var(--accent); letter-spacing: 6px; margin-bottom: 30px; filter: drop-shadow(0 0 10px var(--accent)); }
    
    #trenton-container { position: relative; display: inline-block; }
    #trenton {
        width: 250px; height: 250px; border-radius: 50%; object-fit: cover;
        border: 3px solid var(--accent); cursor: pointer; transition: 0.05s;
        box-shadow: 0 0 50px rgba(0, 210, 255, 0.2); user-select: none;
    }
    #trenton:active { transform: scale(0.94); filter: brightness(1.4); }

    #score-box { 
        background: var(--glass); border: 1px solid var(--glass-border); padding: 15px 60px;
        margin-top: 35px; border-radius: 60px; font-size: 3.2rem; backdrop-filter: blur(15px);
    }

    #shop { 
        background: rgba(0,0,0,0.5); border-left: 1px solid var(--glass-border); 
        padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
        backdrop-filter: blur(25px);
    }

    .card {
        background: var(--glass); border: 1px solid var(--glass-border);
        padding: 20px; border-radius: 14px; cursor: pointer; transition: 0.3s;
        position: relative; display: flex; flex-direction: column; gap: 8px;
    }
    .card:hover:not(.locked) { background: rgba(255,255,255,0.08); transform: translateX(-8px); border-color: var(--accent); }
    .card.is-midas { border-color: var(--midas); box-shadow: inset 0 0 15px rgba(255, 215, 0, 0.1); }
    .card.is-midas .u-title { color: var(--midas); text-shadow: 0 0 5px var(--midas); }
    .card.locked { opacity: 0.15; cursor: not-allowed; filter: grayscale(1); }

    .u-title { font-weight: bold; color: var(--accent); font-size: 1.1rem; letter-spacing: 1px; }
    .u-desc { font-size: 0.8rem; color: #aaa; line-height: 1.5; }
    .u-benefit { font-size: 0.85rem; color: var(--success); font-weight: bold; }
    .u-cost { color: #fff; font-size: 1rem; margin-top: 5px; font-weight: bold; }
    .u-lvl-badge {
        position: absolute; top: 15px; right: 15px; font-size: 0.75rem;
        background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 6px; color: var(--accent);
    }

    #stats { 
        position: fixed; bottom: 0; left: 0; width: calc(100% - 440px); height: 110px;
        background: rgba(0,0,0,0.8); border-top: 1px solid var(--glass-border);
        display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(10px);
    }
    .stat label { font-size: 0.75rem; color: #8b949e; display: block; text-transform: uppercase; letter-spacing: 1px; }
    .stat span { color: var(--accent); font-weight: bold; font-size: 1.7rem; }

    #rebirth-btn {
        width: 100%; padding: 16px; background: var(--rebirth); border: none; border-radius: 10px;
        color: white; font-family: var(--fira); font-weight: bold; cursor: pointer;
        margin-top: 25px; transition: 0.3s; font-size: 1rem;
    }
    #rebirth-btn:disabled { background: #1a1a1a; opacity: 0.4; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
</style>
</head>
<body>

<audio id="bgm" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>

<div id="audio-controls">
    <button class="audio-btn" onclick="App.toggleMusic()">🎵</button>
</div>

<div id="snow"></div>

<div id="game">
    <div id="main">
        <h1>TRENTON ASCENDED</h1>
        <div id="trenton-container">
            <img id="trenton" src="https://lh3.googleusercontent.com/a-/ALV-UjXi81K-KPYiR-v80hz3zt2OidSJgCqq13shIWrh3yzXcUt-ClaL=s512-w512-h512-c-k-no" alt="Trenton" onclick="App.click(event)">
        </div>
        <div id="score-box">0</div>
        
        <div style="width: 320px;">
            <button id="rebirth-btn" onclick="App.rebirth()" disabled>REBIRTH (+0)</button>
            <div style="text-align: center; font-size: 0.8rem; margin-top: 12px; color: var(--rebirth)" id="rb-status">0 Rebirths</div>
            <div style="text-align: center; font-size: 0.7rem; color: #666;" id="rb-next-cost">Cost: 100K</div>
        </div>
    </div>
    <div id="shop"></div>
</div>

<div id="stats">
    <div class="stat"><label>CPS</label><span id="st-cps">0</span></div>
    <div class="stat"><label>CPC</label><span id="st-cpc">1</span></div>
    <div class="stat"><label>CRIT</label><span id="st-crit">5%</span></div>
</div>

<script>
    const App = (() => {
        const suffixes = ["", "K", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc"];
        
        const baseUpgrades = [
            { id: 'm', n: 'Mass Gain', d: 'Trenton bulks up his physical form.', b: '+1 CPS', cps: 1, c: 10, s: 1.15 },
            { id: 's', n: 'Strength Training', d: 'Intense lifting sessions.', b: '+3 CPC', cpc: 3, c: 50, s: 1.2 },
            { id: 'sh', n: 'Bio-Power', d: 'Optimized metabolic output.', b: '+10 CPS / +5 CPC', cps: 10, cpc: 5, c: 250, s: 1.25 },
            { id: 'n', n: 'Neural Pulse', d: 'Brain overclocking protocols.', b: '+45 CPS', cps: 45, c: 1500, s: 1.28 },
            { id: 'cr', n: 'Focus Aura', d: 'Sharper mental concentration.', b: '+3% Crit', cr: 0.03, c: 5000, s: 1.35 },
            { id: 'q', n: 'Quantum Lift', d: 'Lifting weights in 4D space.', b: '+120 CPC', cpc: 120, c: 18000, s: 1.3 },
            { id: 'g', n: 'Gravity Well', d: 'Passive power attraction.', b: '+600 CPS', cps: 600, c: 65000, s: 1.3 },
            { id: 'nb', n: 'Nano-Repair', d: 'Self-fixing cellular tissue.', b: '+2K CPS / +1K CPC', cps: 2000, cpc: 1000, c: 250000, s: 1.32 },
            { id: 'cy', n: 'Cyber Frame', d: 'Reinforced titanium chassis.', b: '+10K CPS', cps: 10000, c: 1200000, s: 1.35 },
            { id: 'v', n: 'Void Breath', d: 'Oxygen is no longer required.', b: '+50K CPC', cpc: 50000, c: 10000000, s: 1.35 },
            { id: 'sl', n: 'Solar Synthesis', d: 'Direct energy from the sun.', b: '+150K CPS', cps: 150000, c: 60000000, s: 1.4 },
            { id: 'ga', n: 'Galaxy Mind', d: 'Processing the cosmos.', b: '+3M CPS', cps: 3000000, c: 6000000000, s: 1.42 },
            { id: 'ti', n: 'Time Warp', d: 'Gain power before you click.', b: '+20M CPC', cpc: 20000000, c: 80000000000, s: 1.45 },
            { id: 'sg', n: 'The Singularity', d: 'The final stage of being.', b: '+100B CPS', cps: 100000000000, c: 1000000000000000, s: 1.6 },
            { id: 'mi', n: 'Midas Touch', d: 'Everything turns to gold.', b: '3x Total Power', midas: 3, c: 1000000000000000000, s: 5, isMidas: true }
        ];

        let state = {
            score: 0, cps: 0, cpc: 1, rebirths: 0, crit: 0.05, 
            rebirthCost: 100000, midasMult: 1,
            upgrades: baseUpgrades.map(u => ({...u, lvl: 0}))
        };

        const format = (n) => {
            if (n < 1000) return Math.floor(n);
            const e = Math.floor(Math.log10(n) / 3);
            return (n / Math.pow(10, e * 3)).toFixed(2) + (suffixes[e] || "??");
        };

        const save = () => localStorage.setItem('trenton_v2_bulk_save', JSON.stringify(state));

        const load = () => {
            const raw = localStorage.getItem('trenton_v2_bulk_save');
            if (raw) {
                const saved = JSON.parse(raw);
                saved.upgrades.forEach(su => {
                    const u = state.upgrades.find(item => item.id === su.id);
                    if(u) { u.lvl = su.lvl; u.c = su.c; }
                });
                state.score = saved.score; state.cps = saved.cps; state.cpc = saved.cpc;
                state.rebirths = saved.rebirths; state.crit = saved.crit;
                state.rebirthCost = saved.rebirthCost; state.midasMult = saved.midasMult || 1;
            }
        };

        const renderShop = () => {
            const shop = document.getElementById('shop'); shop.innerHTML = '';
            state.upgrades.forEach((u, i) => {
                const card = document.createElement('div');
                card.className = `card ${u.isMidas ? 'is-midas' : ''}`;
                card.id = `u-${u.id}`;
                card.onclick = () => buy(i);
                card.innerHTML = `<div class="u-lvl-badge">OWNED: ${u.lvl}</div><div class="u-title">${u.n}</div><div class="u-desc">${u.d}</div><div class="u-benefit">${u.b}</div><div class="u-cost">Cost: ${format(u.c)}</div>`;
                shop.appendChild(card);
            });
        };

        const createVisuals = (e, val, isCrit) => {
            const ripple = document.createElement('div');
            ripple.className = 'ripple'; ripple.style.left = `${e.pageX}px`; ripple.style.top = `${e.pageY}px`;
            document.body.appendChild(ripple); setTimeout(() => ripple.remove(), 500);

            const popup = document.createElement('div');
            popup.className = `popup ${isCrit ? 'crit-text' : 'normal-text'}`;
            popup.style.left = `${e.pageX}px`; popup.style.top = `${e.pageY}px`;
            popup.innerText = (isCrit ? 'CRIT! ' : '+') + format(val);
            document.body.appendChild(popup); setTimeout(() => popup.remove(), 800);
        };

        const buy = (i) => {
            const u = state.upgrades[i];
            if (state.score >= u.c) {
                state.score -= u.c; u.lvl++;
                if (u.cps) state.cps += u.cps; if (u.cpc) state.cpc += u.cpc; if (u.cr) state.crit += u.cr;
                if (u.midas) state.midasMult *= u.midas;
                u.c *= u.s; refresh(); save();
            }
        };

        const refresh = () => {
            const mult = (1 + (state.rebirths * 0.7)) * state.midasMult;
            document.getElementById('score-box').innerText = format(state.score);
            document.getElementById('st-cps').innerText = format(state.cps * mult);
            document.getElementById('st-cpc').innerText = format(state.cpc * mult);
            document.getElementById('st-crit').innerText = Math.min(Math.round(state.crit * 100), 100) + "%";
            document.getElementById('rb-status').innerText = `${state.rebirths} Rebirths (Mult: ${mult.toFixed(1)}x)`;
            
            // Bulk Rebirth Calculation
            let possibleRebirths = 0;
            let nextCost = state.rebirthCost;
            let tempScore = state.score;
            while(tempScore >= nextCost) {
                tempScore -= nextCost;
                nextCost *= 1.7;
                possibleRebirths++;
            }

            const rbBtn = document.getElementById('rebirth-btn');
            rbBtn.innerText = `REBIRTH (+${possibleRebirths})`;
            rbBtn.disabled = possibleRebirths === 0;
            document.getElementById('rb-next-cost').innerText = `Cost: ${format(state.rebirthCost)}`;

            state.upgrades.forEach(u => {
                const el = document.getElementById(`u-${u.id}`);
                if (el) {
                    el.querySelector('.u-cost').innerText = `Cost: ${format(u.c)}`;
                    el.querySelector('.u-lvl-badge').innerText = `OWNED: ${u.lvl}`;
                    state.score >= u.c ? el.classList.remove('locked') : el.classList.add('locked');
                }
            });
        };

        load();
        
        setInterval(() => {
            const mult = (1 + (state.rebirths * 0.7)) * state.midasMult;
            state.score += (state.cps * mult) / 10; refresh();
        }, 100);

        setInterval(save, 5000);

        return {
            click: (e) => {
                const mult = (1 + (state.rebirths * 0.7)) * state.midasMult;
                const isCrit = Math.random() < state.crit;
                const gain = state.cpc * mult * (isCrit ? 5 : 1);
                state.score += gain; createVisuals(e, gain, isCrit); refresh();
            },
            rebirth: () => {
                let count = 0;
                let nextCost = state.rebirthCost;
                while(state.score >= nextCost) {
                    state.score -= nextCost;
                    nextCost *= 1.7;
                    count++;
                }

                if (count > 0) {
                    state.rebirths += count;
                    state.rebirthCost = nextCost;
                    state.score = 0; state.cps = 0; state.cpc = 1; state.crit = 0.05; state.midasMult = 1;
                    state.upgrades.forEach(u => { 
                        u.lvl = 0; 
                        u.c = baseUpgrades.find(b => b.id === u.id).c; 
                    });
                    renderShop(); refresh(); save();
                }
            },
            toggleMusic: () => {
                const bgm = document.getElementById('bgm');
                bgm.paused ? bgm.play() : bgm.pause();
            },
            init: () => { renderShop(); refresh(); }
        };
    })();

    window.onload = () => App.init();
    
    const snow = document.getElementById('snow');
    for (let i = 0; i < 40; i++) {
        const f = document.createElement('div'); f.className = 'flake';
        f.style.cssText = `width:${Math.random()*4+2}px;height:${Math.random()*4+2}px;left:${Math.random()*100}%;animation-duration:${Math.random()*3+2}s;`;
        snow.appendChild(f);
    }
</script>
</body>
</html>
