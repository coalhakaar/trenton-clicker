<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenton Ascended: Octillion Era</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #020406;
        --accent: #00d2ff;
        --glass: rgba(255, 255, 255, 0.04);
        --glass-border: rgba(255, 255, 255, 0.1);
        --rebirth: #a29bfe;
        --success: #00ff88;
        --midas: #ffd700;
        --crit: #ff4757;
        --fira: 'Fira Code', monospace;
    }

    body, html { 
        margin: 0; padding: 0; height: 100%; font-family: var(--fira);
        background: var(--bg); color: #e6edf3; overflow: hidden;
    }

    #snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
    .flake { position: absolute; top: -10%; background: white; border-radius: 50%; animation: fall linear infinite; opacity: 0.2; }
    @keyframes fall { to { transform: translateY(110vh); } }

    .ripple {
        position: absolute; border: 2px solid var(--accent); border-radius: 50%;
        transform: translate(-50%, -50%); pointer-events: none;
        animation: ripple-out 0.4s linear forwards; z-index: 99;
    }
    @keyframes ripple-out {
        from { width: 0; height: 0; opacity: 1; }
        to { width: 200px; height: 200px; opacity: 0; }
    }

    .popup {
        position: absolute; font-weight: bold; pointer-events: none;
        z-index: 1000; animation: float-up 0.7s ease-out forwards;
        text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }
    @keyframes float-up {
        0% { transform: translate(-50%, 0) scale(1); opacity: 1; }
        100% { transform: translate(-50%, -150px) scale(1.2); opacity: 0; }
    }
    .crit-text { color: var(--crit); font-size: 2.2rem; filter: drop-shadow(0 0 12px var(--crit)); }
    .normal-text { color: var(--accent); font-size: 1.2rem; }

    #audio-controls { position: fixed; top: 20px; left: 20px; z-index: 100; }
    .audio-btn { background: var(--glass); border: 1px solid var(--glass-border); color: white; padding: 12px; border-radius: 50%; cursor: pointer; backdrop-filter: blur(10px); }

    #game { display: grid; grid-template-columns: 1fr 460px; height: 100vh; }
    #main { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding-bottom: 80px; }
    h1 { font-size: 2rem; color: var(--accent); letter-spacing: 6px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--accent)); }
    
    #trenton-container { position: relative; display: inline-block; }
    #trenton {
        width: 250px; height: 250px; border-radius: 50%; object-fit: cover;
        border: 3px solid var(--accent); cursor: pointer; transition: 0.05s;
        box-shadow: 0 0 60px rgba(0, 210, 255, 0.15); user-select: none;
    }
    #trenton:active { transform: scale(0.92); filter: brightness(1.5); }

    #score-box { 
        background: var(--glass); border: 1px solid var(--glass-border); padding: 15px 40px;
        margin-top: 30px; border-radius: 60px; font-size: 2.8rem; backdrop-filter: blur(15px);
        min-width: 260px; text-align: center;
    }

    #shop { 
        background: rgba(0,0,0,0.6); border-left: 1px solid var(--glass-border); 
        padding: 25px; overflow-y: scroll; display: flex; flex-direction: column; gap: 12px;
        backdrop-filter: blur(30px);
    }

    .card {
        background: var(--glass); border: 1px solid var(--glass-border);
        padding: 16px; border-radius: 12px; cursor: pointer; transition: 0.2s;
        position: relative; display: flex; flex-direction: column; gap: 4px;
    }
    .card:hover:not(.locked) { background: rgba(255,255,255,0.08); transform: translateX(-5px); border-color: var(--accent); }
    .card.is-midas { border-color: var(--midas); background: rgba(255, 215, 0, 0.05); }
    .card.is-midas .u-title { color: var(--midas); text-shadow: 0 0 8px var(--midas); }
    .card.locked { opacity: 0.1; cursor: not-allowed; filter: grayscale(1); }

    .u-title { font-weight: bold; color: var(--accent); font-size: 0.95rem; letter-spacing: 0.5px; }
    .u-desc { font-size: 0.75rem; color: #888; line-height: 1.4; }
    .u-benefit { font-size: 0.8rem; color: var(--success); font-weight: bold; }
    .u-cost { color: #fff; font-size: 0.9rem; margin-top: 4px; font-weight: 700; }
    .u-lvl-badge {
        position: absolute; top: 12px; right: 12px; font-size: 0.65rem;
        background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 4px; color: var(--accent);
    }

    #stats { 
        position: fixed; bottom: 0; left: 0; width: calc(100% - 460px); height: 110px;
        background: rgba(0,0,0,0.85); border-top: 1px solid var(--glass-border);
        display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(15px);
    }
    .stat label { font-size: 0.7rem; color: #666; display: block; text-transform: uppercase; letter-spacing: 2px; }
    .stat span { color: var(--accent); font-weight: bold; font-size: 1.5rem; }

    #rebirth-btn {
        width: 100%; padding: 16px; background: var(--rebirth); border: none; border-radius: 10px;
        color: white; font-family: var(--fira); font-weight: bold; cursor: pointer;
        margin-top: 25px; transition: 0.3s; font-size: 0.9rem;
    }
    #rebirth-btn:disabled { background: #111; color: #444; cursor: not-allowed; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
</style>
</head>
<body>

<audio id="bgm" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>

<div id="audio-controls">
    <button class="audio-btn" onclick="App.toggleMusic()">🎵</button>
</div>

<div id="snow"></div>

<div id="game">
    <div id="main">
        <h1>TRENTON ASCENDED</h1>
        <div id="trenton-container">
            <img id="trenton" src="https://lh3.googleusercontent.com/a-/ALV-UjXi81K-KPYiR-v80hz3zt2OidSJgCqq13shIWrh3yzXcUt-ClaL=s512-w512-h512-c-k-no" alt="Trenton" onclick="App.click(event)">
        </div>
        <div id="score-box">0</div>
        
        <div style="width: 320px;">
            <button id="rebirth-btn" onclick="App.rebirth()" disabled>REBIRTH (+0)</button>
            <div style="text-align: center; font-size: 0.8rem; margin-top: 12px; color: var(--rebirth)" id="rb-status">0 Rebirths</div>
            <div style="text-align: center; font-size: 0.7rem; color: #555;" id="rb-next-cost">Cost: 100K</div>
        </div>
    </div>
    <div id="shop"></div>
</div>

<div id="stats">
    <div class="stat"><label>CPS</label><span id="st-cps">0</span></div>
    <div class="stat"><label>CPC</label><span id="st-cpc">1</span></div>
    <div class="stat"><label>CRIT</label><span id="st-crit">5%</span></div>
</div>

<script>
    const App = (() => {
        const SAVE_KEY = 'trenton_ascended_stable_v1';
        const OLD_KEYS = ['trenton_v3_expansion_save', 'trenton_v2_bulk_save', 'trenton_v2_final_save'];
        
        const suffixes = ["", "K", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc", "UDe", "DDe", "TDe", "QdDe", "QnDe", "SxDe", "SpDe", "OcDe", "NoDe", "Vg"];
        
        // UPGRADES ORDERED BY PRICE
        const baseUpgrades = [
            { id: 'm', n: 'Mass Gain', d: 'Basic muscle growth.', b: '+1 CPS', cps: 1, c: 10, s: 1.15 },
            { id: 's', n: 'Strength Training', d: 'Intense lifting.', b: '+3 CPC', cpc: 3, c: 50, s: 1.18 },
            { id: 'sh', n: 'Bio-Power', d: 'Metabolic optimization.', b: '+10 CPS / +5 CPC', cps: 10, cpc: 5, c: 250, s: 1.22 },
            { id: 'n', n: 'Neural Pulse', d: 'Brain overclock.', b: '+45 CPS', cps: 45, c: 1500, s: 1.25 },
            { id: 'cr', n: 'Focus Aura', d: 'Critical focus.', b: '+3% Crit (Max 50%)', cr: 0.03, c: 5000, s: 1.3 },
            { id: 'q', n: 'Quantum Lift', d: '4D weights.', b: '+120 CPC', cpc: 120, c: 18000, s: 1.28 },
            { id: 'g', n: 'Gravity Well', d: 'Power attraction.', b: '+600 CPS', cps: 600, c: 75000, s: 1.3 },
            { id: 'nb', n: 'Nano-Repair', d: 'Self-fixing cells.', b: '+2K CPS / +1K CPC', cps: 2000, cpc: 1000, c: 300000, s: 1.32 },
            { id: 'cy', n: 'Cyber Frame', d: 'Titanium chassis.', b: '+10K CPS', cps: 10000, c: 1500000, s: 1.35 },
            { id: 'v', n: 'Void Breath', d: 'No oxygen required.', b: '+50K CPC', cpc: 50000, c: 15000000, s: 1.38 },
            { id: 'sl', n: 'Solar Synthesis', d: 'Solar power.', b: '+150K CPS', cps: 150000, c: 80000000, s: 1.4 },
            { id: 'ga', n: 'Galaxy Mind', d: 'Universal logic.', b: '+3M CPS', cps: 3000000, c: 1000000000, s: 1.42 },
            { id: 'ti', n: 'Time Warp', d: 'Power from the future.', b: '+20M CPC', cpc: 20000000, c: 80000000000, s: 1.45 },
            { id: 'cb', n: 'Chrono-Buffer', d: 'Store time within cells.', b: '+80M CPC', cpc: 80000000, c: 600000000000, s: 1.45 },
            { id: 'dt', n: 'Dimensional Tear', d: 'Other reality power.', b: '+300M CPS', cps: 300000000, c: 5000000000000, s: 1.48 },
            { id: 'af', n: 'Antimatter Forge', d: 'Harness annihilation.', b: '+2B CPS', cps: 2000000000, c: 80000000000000, s: 1.5 },
            { id: 'nc', n: 'Neutron Core', d: 'Density of a dying star.', b: '+10B CPC', cpc: 10000000000, c: 1000000000000000, s: 1.52 },
            { id: 'eh', n: 'Event Horizon', d: 'Nothing escapes.', b: '+150B CPS', cps: 150000000000, c: 25000000000000000, s: 1.55 },
            { id: 'dm', n: 'Dark Infusion', d: 'Invisible mass.', b: '+800B CPS', cps: 800000000000, c: 600000000000000000, s: 1.55 },
            { id: 'uc', n: 'Universal Constant', d: 'Law of physics.', b: '+4T CPC', cpc: 4000000000000, c: 12000000000000000000, s: 1.58 },
            { id: 'cbg', n: 'Cosmic Background', d: 'Echo of the Big Bang.', b: '+50T CPS', cps: 50000000000000, c: 300000000000000000000, s: 1.6 },
            { id: 'ta', n: 'The Great Attractor', d: 'Pulling everything.', b: '+400T CPS', cps: 400000000000000, c: 8000000000000000000000, s: 1.62 },
            { id: 'me', n: 'Multiversal Engine', d: 'Fueling across realities.', b: '+5Qa CPC', cpc: 5000000000000000, c: 150000000000000000000000, s: 1.65 },
            { id: 'sg', n: 'The Singularity', d: 'The end.', b: '+100Qa CPS', cps: 100000000000000000, c: 40000000000000000000000000, s: 1.7 },
            { id: 'mi', n: 'Midas Touch', d: 'Pure Gold.', b: '3x Total Power', midas: 3, c: 1e27, s: 10, isMidas: true }
        ];

        let state = {
            score: 0, cps: 0, cpc: 1, rebirths: 0, crit: 0.05, 
            rebirthCost: 100000, midasMult: 1,
            upgrades: baseUpgrades.map(u => ({...u, lvl: 0}))
        };

        const format = (n) => {
            if (n < 1000) return Math.floor(n);
            const e = Math.floor(Math.log10(n) / 3);
            if (e >= suffixes.length) return n.toExponential(2);
            return (n / Math.pow(10, e * 3)).toFixed(2) + suffixes[e];
        };

        const save = () => localStorage.setItem(SAVE_KEY, JSON.stringify(state));

        const load = () => {
            let raw = localStorage.getItem(SAVE_KEY);
            if (!raw) {
                for (let oldKey of OLD_KEYS) {
                    const oldData = localStorage.getItem(oldKey);
                    if (oldData) { raw = oldData; break; }
                }
            }
            if (raw) {
                const saved = JSON.parse(raw);
                state.upgrades.forEach(u => {
                    const savedU = saved.upgrades.find(su => su.id === u.id);
                    if (savedU) { u.lvl = savedU.lvl; u.c = savedU.c; }
                });
                state.score = saved.score || 0;
                state.cps = saved.cps || 0;
                state.cpc = saved.cpc || 1;
                state.rebirths = saved.rebirths || 0;
                state.crit = Math.min(saved.crit || 0.05, 0.5);
                state.rebirthCost = saved.rebirthCost || 100000;
                state.midasMult = saved.midasMult || 1;
            }
        };

        const renderShop = () => {
            const shop = document.getElementById('shop'); shop.innerHTML = '';
            state.upgrades.forEach((u, i) => {
                const card = document.createElement('div');
                card.className = `card ${u.isMidas ? 'is-midas' : ''}`;
                card.id = `u-${u.id}`;
                card.onclick = () => buy(i);
                card.innerHTML = `<div class="u-lvl-badge">OWNED: ${u.lvl}</div><div class="u-title">${u.n}</div><div class="u-desc">${u.d}</div><div class="u-benefit">${u.b}</div><div class="u-cost">Cost: ${format(u.c)}</div>`;
                shop.appendChild(card);
            });
        };

        const createVisuals = (e, val, isCrit) => {
            const ripple = document.createElement('div');
            ripple.className = 'ripple'; ripple.style.left = `${e.pageX}px`; ripple.style.top = `${e.pageY}px`;
            document.body.appendChild(ripple); setTimeout(() => ripple.remove(), 400);

            const popup = document.createElement('div');
            popup.className = `popup ${isCrit ? 'crit-text' : 'normal-text'}`;
            popup.style.left = `${e.pageX}px`; popup.style.top = `${e.pageY}px`;
            popup.innerText = (isCrit ? 'CRIT! ' : '+') + format(val);
            document.body.appendChild(popup); setTimeout(() => popup.remove(), 700);
        };

        const buy = (i) => {
            const u = state.upgrades[i];
            if (state.score >= u.c) {
                state.score -= u.c; u.lvl++;
                if (u.cps) state.cps += u.cps; 
                if (u.cpc) state.cpc += u.cpc; 
                if (u.cr) state.crit = Math.min(state.crit + u.cr, 0.5); // CAP AT 50%
                if (u.midas) state.midasMult *= u.midas;
                u.c *= u.s; refresh(); save();
            }
        };

        const refresh = () => {
            const mult = (1 + (state.rebirths * 0.7)) * state.midasMult;
            document.getElementById('score-box').innerText = format(state.score);
            document.getElementById('st-cps').innerText = format(state.cps * mult);
            document.getElementById('st-cpc').innerText = format(state.cpc * mult);
            document.getElementById('st-crit').innerText = Math.round(state.crit * 100) + "%";
            document.getElementById('rb-status').innerText = `${state.rebirths} Rebirths (Mult: ${mult.toFixed(1)}x)`;
            
            let possibleRebirths = 0;
            let nextCost = state.rebirthCost;
            let tempScore = state.score;
            while(tempScore >= nextCost && possibleRebirths < 1000) {
                tempScore -= nextCost;
                nextCost *= 1.7;
                possibleRebirths++;
            }

            const rbBtn = document.getElementById('rebirth-btn');
            rbBtn.innerText = `REBIRTH (+${possibleRebirths})`;
            rbBtn.disabled = possibleRebirths === 0;
            document.getElementById('rb-next-cost').innerText = `Cost: ${format(state.rebirthCost)}`;

            state.upgrades.forEach(u => {
                const el = document.getElementById(`u-${u.id}`);
                if (el) {
                    el.querySelector('.u-cost').innerText = `Cost: ${format(u.c)}`;
                    el.querySelector('.u-lvl-badge').innerText = `OWNED: ${u.lvl}`;
                    state.score >= u.c ? el.classList.remove('locked') : el.classList.add('locked');
                }
            });
        };

        load();
        
        setInterval(() => {
            const mult = (1 + (state.rebirths * 0.7)) * state.midasMult;
            state.score += (state.cps * mult) / 10; refresh();
        }, 100);

        setInterval(save, 5000);

        return {
            click: (e) => {
                const mult = (1 + (state.rebirths * 0.7)) * state.midasMult;
                const isCrit = Math.random() < state.crit;
                const gain = state.cpc * mult * (isCrit ? 5 : 1);
                state.score += gain; createVisuals(e, gain, isCrit); refresh();
            },
            rebirth: () => {
                let count = 0;
                let nextCost = state.rebirthCost;
                while(state.score >= nextCost) {
                    state.score -= nextCost;
                    nextCost *= 1.7;
                    count++;
                }

                if (count > 0) {
                    state.rebirths += count;
                    state.rebirthCost = nextCost;
                    state.score = 0; state.cps = 0; state.cpc = 1; state.crit = 0.05; state.midasMult = 1;
                    state.upgrades.forEach(u => { 
                        u.lvl = 0; 
                        u.c = baseUpgrades.find(b => b.id === u.id).c; 
                    });
                    renderShop(); refresh(); save();
                }
            },
            toggleMusic: () => {
                const bgm = document.getElementById('bgm');
                bgm.paused ? bgm.play() : bgm.pause();
            },
            init: () => { renderShop(); refresh(); }
        };
    })();

    window.onload = () => App.init();
    
    const snow = document.getElementById('snow');
    for (let i = 0; i < 40; i++) {
        const f = document.createElement('div'); f.className = 'flake';
        f.style.cssText = `width:${Math.random()*4+2}px;height:${Math.random()*4+2}px;left:${Math.random()*100}%;animation-duration:${Math.random()*3+2}s;`;
        snow.appendChild(f);
    }
</script>
</body>
</html>
