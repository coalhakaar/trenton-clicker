<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenton Ascended: Final Restoration</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #020406; --accent: #00d2ff; --glass: rgba(255, 255, 255, 0.04);
        --glass-border: rgba(255, 255, 255, 0.1); --rebirth: #a29bfe;
        --success: #00ff88; --midas: #ffd700; --crit: #ff4757;
        --final: #ff00ff; --fira: 'Fira Code', monospace;
    }
    body, html { margin: 0; padding: 0; height: 100%; font-family: var(--fira); background: var(--bg); color: #e6edf3; overflow: hidden; }
    #game { display: grid; grid-template-columns: 1fr 460px; height: 100vh; }
    #main { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding-bottom: 80px; }
    #trenton { width: 220px; height: 220px; border-radius: 50%; border: 3px solid var(--accent); cursor: pointer; transition: 0.05s; user-select: none; }
    #trenton:active { transform: scale(0.92); filter: brightness(1.5); }
    #score-box { background: var(--glass); border: 1px solid var(--glass-border); padding: 12px 30px; margin-top: 20px; border-radius: 60px; font-size: 2.2rem; backdrop-filter: blur(15px); min-width: 240px; text-align: center; }
    #shop-container { background: rgba(0,0,0,0.8); border-left: 1px solid var(--glass-border); display: flex; flex-direction: column; overflow: hidden; }
    #shop-list { padding: 20px; overflow-y: scroll; display: flex; flex-direction: column; gap: 8px; height: 100%; }
    .card { background: var(--glass); border: 1px solid var(--glass-border); padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; position: relative; }
    .card:hover:not(.locked) { border-color: var(--accent); background: rgba(0, 210, 255, 0.05); }
    .card.locked { opacity: 0.2; cursor: not-allowed; }
    .u-title { font-weight: bold; color: var(--accent); font-size: 0.85rem; }
    .u-cost { color: #fff; font-size: 0.8rem; font-weight: bold; }
    #stats { position: fixed; bottom: 0; left: 0; width: calc(100% - 460px); height: 80px; background: rgba(0,0,0,0.95); border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; }
    .controls { margin-top: 15px; display: flex; flex-direction: column; gap: 6px; width: 280px; }
    button { font-family: var(--fira); font-weight: bold; cursor: pointer; border: none; border-radius: 4px; }
    #rebirth-btn { padding: 10px; background: var(--rebirth); color: white; }
    .small-btn { padding: 4px; font-size: 0.6rem; background: #111; color: #555; border: 1px solid #333; }
    #clear-btn { background: #3d0000; color: #ff4757; border: 1px solid #700; }
    #clear-btn:hover { background: #600; color: #fff; }
    .popup { position: absolute; pointer-events: none; animation: float-up 0.6s forwards; font-weight: bold; z-index: 100; }
    @keyframes float-up { to { transform: translateY(-80px); opacity: 0; } }
</style>
</head>
<body>

<div id="game">
    <div id="main">
        <h1 style="letter-spacing:3px; color:var(--accent); font-size: 1.5rem;">TRENTON ASCENDED</h1>
        <img id="trenton" src="https://lh3.googleusercontent.com/a-/ALV-UjXi81K-KPYiR-v80hz3zt2OidSJgCqq13shIWrh3yzXcUt-ClaL=s512-w512-h512-c-k-no" alt="Trenton" onclick="App.click(event)">
        <div id="score-box">0</div>
        <div class="controls">
            <button id="rebirth-btn" onclick="App.rebirth()">REBIRTH (+0)</button>
            <button class="small-btn" onclick="App.toggleMusic()">TOGGLE MUSIC</button>
            <button class="small-btn" id="clear-btn" onclick="App.clearData()">CLEAR ALL DATA</button>
            <div id="rb-status" style="font-size:0.65rem; text-align:center; color:var(--rebirth)">0 Rebirths</div>
        </div>
    </div>
    <div id="shop-container">
        <div style="display:flex; background:#000; border-bottom:1px solid var(--glass-border)">
            <button style="flex:1; padding:12px; background:transparent; color:var(--accent); font-weight:bold;" onclick="App.setTab('u')">UPGRADES</button>
            <button style="flex:1; padding:12px; background:transparent; color:var(--rebirth); font-weight:bold;" onclick="App.setTab('p')">PERKS</button>
        </div>
        <div id="shop-list"></div>
    </div>
</div>

<div id="stats">
    <div class="stat"><span id="st-cps">0</span><br><small style="font-size:0.5rem; color:#666">CPS</small></div>
    <div class="stat"><span id="st-cpc">1</span><br><small style="font-size:0.5rem; color:#666">CPC</small></div>
    <div class="stat"><span id="st-crit">5%</span><br><small style="font-size:0.5rem; color:#666">CRIT</small></div>
</div>

<audio id="bgm" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>

<script>
const App = (() => {
    const SAVE_KEY = 'trenton_omega_v4';
    const suffixes = ["", "K", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc", "UDe", "DDe", "TDe", "QdDe", "QnDe", "SxDe", "SpDe", "OcDe", "NoDe", "Vg"];
    
    const baseItems = [
        { id: 'm', n: 'Mass Gain', b: '+1 CPS', cps: 1, c: 10, s: 1.15 },
        { id: 's', n: 'Strength', b: '+3 CPC', cpc: 3, c: 50, s: 1.18 },
        { id: 'sh', n: 'Bio-Power', b: '+10 CPS / +5 CPC', cps: 10, cpc: 5, c: 250, s: 1.22 },
        { id: 'n', n: 'Neural Pulse', b: '+45 CPS', cps: 45, c: 1500, s: 1.25 },
        { id: 'cr', n: 'Focus Aura', b: '+3% Crit', cr: 0.03, c: 5000, s: 1.3 },
        { id: 'q', n: 'Quantum Lift', b: '+120 CPC', cpc: 120, c: 18000, s: 1.28 },
        { id: 'g', n: 'Gravity Well', b: '+600 CPS', cps: 600, c: 75000, s: 1.3 },
        { id: 'nb', n: 'Nano-Repair', b: '+2K CPS / +1K CPC', cps: 2000, cpc: 1000, c: 300000, s: 1.32 },
        { id: 'cy', n: 'Cyber Frame', b: '+10K CPS', cps: 10000, c: 1500000, s: 1.35 },
        { id: 'v', n: 'Void Breath', b: '+50K CPC', cpc: 50000, c: 15000000, s: 1.38 },
        { id: 'sl', n: 'Solar Synthesis', b: '+150K CPS', cps: 150000, c: 80000000, s: 1.4 },
        { id: 'ga', n: 'Galaxy Mind', b: '+3M CPS', cps: 3000000, c: 1e9, s: 1.42 },
        { id: 'ti', n: 'Time Warp', b: '+20M CPC', cpc: 2e7, c: 8e10, s: 1.45 },
        { id: 'cb', n: 'Chrono-Buffer', b: '+80M CPC', cpc: 8e7, c: 6e11, s: 1.45 },
        { id: 'dt', n: 'Dimensional Tear', b: '+300M CPS', cps: 3e8, c: 5e12, s: 1.48 },
        { id: 'af', n: 'Antimatter Forge', b: '+2B CPS', cps: 2e9, c: 8e13, s: 1.5 },
        { id: 'nc', n: 'Neutron Core', b: '+10B CPC', cpc: 1e10, c: 1e15, s: 1.52 },
        { id: 'eh', n: 'Event Horizon', b: '+150B CPS', cps: 1.5e11, c: 2.5e16, s: 1.55 },
        { id: 'dm', n: 'Dark Infusion', b: '+800B CPS', cps: 8e11, c: 6e17, s: 1.55 },
        { id: 'uc', n: 'Universal Constant', b: '+4T CPC', cpc: 4e12, c: 1.2e19, s: 1.58 },
        { id: 'sx', n: 'Sextillion Surge', b: '+50B CPC', cpc: 5e10, c: 1.5e20, s: 1.5 },
        { id: 'cbg', n: 'Cosmic Background', b: '+50T CPS', cps: 5e13, c: 3e20, s: 1.6 },
        { id: 'ta', n: 'Great Attractor', b: '+400T CPS', cps: 4e14, c: 8e21, s: 1.62 },
        { id: 'me', n: 'Multiversal Engine', b: '+5Qa CPC', cpc: 5e15, c: 1.5e23, s: 1.65 },
        { id: 'sg', n: 'The Singularity', b: '+100Qa CPS', cps: 1e17, c: 4e25, s: 1.7 },
        { id: 'ap', n: 'Precision', b: '100% CRIT', ap: true, c: 1e26, s: 10 },
        { id: 'mi', n: 'Midas Touch', b: '3x Total Power', midas: 3, c: 1e27, s: 10 }
    ];

    const perkItems = [
        { id: 'p1', n: 'Ascension Might', b: '+50% RB Mult', pmult: 0.5, c: 1 },
        { id: 'p2', n: 'Lucky Soul', b: '+10% Base Crit', pcrit: 0.1, c: 5 },
        { id: 'p3', n: 'Time Flow', b: '+20% Extra CPS', pspeed: 0.2, c: 20 },
        { id: 'p4', n: 'God Finger', b: '2x Click Power', pclick: 1, c: 100 }
    ];

    let state = {
        score: 0, rebirths: 0, currentRBPoints: 0, hasAP: false, crit: 0.05, midas: 1, tab: 'u', music: false,
        upgrades: baseItems.map(i => ({...i, lvl: 0})),
        perks: perkItems.map(i => ({...i, lvl: 0}))
    };

    const format = (n) => {
        if (n < 1000) return Math.floor(n);
        const e = Math.floor(Math.log10(n) / 3);
        if (e >= suffixes.length) return n.toExponential(2);
        return (n / Math.pow(10, e * 3)).toFixed(2) + suffixes[e];
    };

    const refresh = () => {
        const rbPow = 1 + (state.perks.find(p=>p.id==='p1').lvl * 0.5);
        const pSpeed = 1 + (state.perks.find(p=>p.id==='p3').lvl * 0.2);
        const pClick = 1 + (state.perks.find(p=>p.id==='p4').lvl * 1);
        const pCrit = state.perks.find(p=>p.id==='p2').lvl * 0.1;
        const baseMult = (1 + (state.rebirths * 0.7 * rbPow)) * state.midas;
        
        document.getElementById('score-box').innerText = format(state.score);
        document.getElementById('st-cps').innerText = format(state.upgrades.reduce((a,b)=>a+(b.cps||0)*b.lvl,0) * baseMult * pSpeed);
        document.getElementById('st-cpc').innerText = format(state.upgrades.reduce((a,b)=>a+(b.cpc||0)*b.lvl,1) * baseMult * pClick);
        document.getElementById('st-crit').innerText = Math.round((state.hasAP ? 1 : Math.min(state.crit + pCrit, 0.5)) * 100) + "%";
        document.getElementById('rb-status').innerText = `${state.rebirths} Rebirths (${state.currentRBPoints} Perk Points)`;

        let possibleRB = 0, rbCost = 1e5, tempScore = state.score;
        while(tempScore >= rbCost) { tempScore -= rbCost; rbCost *= 1.7; possibleRB++; }
        document.getElementById('rebirth-btn').innerText = `REBIRTH (+${possibleRB})`;
        document.getElementById('rebirth-btn').disabled = possibleRB === 0;

        const list = document.getElementById('shop-list');
        list.innerHTML = '';
        
        if (state.tab === 'u') {
            state.upgrades.sort((a,b) => a.c - b.c);
            state.upgrades.forEach(u => {
                const card = document.createElement('div');
                card.className = `card ${state.score < u.c ? 'locked' : ''}`;
                card.innerHTML = `<div class="u-title">${u.n} (Lv ${u.lvl})</div><div style="font-size:0.6rem;color:#888">${u.b}</div><div class="u-cost">Cost: ${format(u.c)}</div>`;
                card.onclick = () => {
                    if(state.score >= u.c) {
                        state.score -= u.c; u.lvl++; u.c *= u.s;
                        if(u.ap) state.hasAP = true;
                        if(u.cr && !state.hasAP) state.crit += u.cr;
                        if(u.midas) state.midas *= u.midas;
                        refresh(); save();
                    }
                };
                list.appendChild(card);
            });
        } else {
            state.perks.forEach(p => {
                const card = document.createElement('div');
                card.className = `card ${state.currentRBPoints < p.c ? 'locked' : ''}`;
                card.innerHTML = `<div class="u-title" style="color:var(--rebirth)">${p.n} (Lv ${p.lvl})</div><div style="font-size:0.6rem;color:#888">${p.b}</div><div class="u-cost">Cost: ${p.c} RB</div>`;
                card.onclick = () => {
                    if(state.currentRBPoints >= p.c) {
                        state.currentRBPoints -= p.c; p.lvl++;
                        refresh(); save();
                    }
                };
                list.appendChild(card);
            });
        }
    };

    const save = () => localStorage.setItem(SAVE_KEY, JSON.stringify(state));
    const load = () => {
        const raw = localStorage.getItem(SAVE_KEY);
        if(raw) {
            const s = JSON.parse(raw);
            state.score = s.score || 0; state.rebirths = s.rebirths || 0; state.currentRBPoints = s.currentRBPoints || 0;
            state.hasAP = s.hasAP || false; state.crit = s.crit || 0.05; state.midas = s.midas || 1;
            state.upgrades.forEach(u => {
                const sv = (s.upgrades || []).find(x => x.id === u.id);
                if(sv) { u.lvl = sv.lvl; u.c = sv.c; }
            });
            state.perks.forEach(p => {
                const sv = (s.perks || []).find(x => x.id === p.id);
                if(sv) p.lvl = sv.lvl;
            });
        }
    };

    setInterval(() => {
        const rbPow = 1 + (state.perks.find(p=>p.id==='p1').lvl * 0.5);
        const pSpeed = 1 + (state.perks.find(p=>p.id==='p3').lvl * 0.2);
        const baseMult = (1 + (state.rebirths * 0.7 * rbPow)) * state.midas;
        state.score += (state.upgrades.reduce((a,b)=>a+(b.cps||0)*b.lvl,0) * baseMult * pSpeed) / 10;
        document.getElementById('score-box').innerText = format(state.score);
    }, 100);

    return {
        click: (e) => {
            const rbPow = 1 + (state.perks.find(p=>p.id==='p1').lvl * 0.5);
            const pClick = 1 + (state.perks.find(p=>p.id==='p4').lvl * 1);
            const pCrit = state.perks.find(p=>p.id==='p2').lvl * 0.1;
            const baseMult = (1 + (state.rebirths * 0.7 * rbPow)) * state.midas;
            const isCrit = Math.random() < (state.hasAP ? 1 : Math.min(state.crit + pCrit, 0.5));
            const gain = (state.upgrades.reduce((a,b)=>a+(b.cpc||0)*b.lvl,1) * baseMult * pClick) * (isCrit ? 5 : 1);
            state.score += gain;
            const p = document.createElement('div'); p.className = 'popup';
            p.style.left = e.pageX+'px'; p.style.top = e.pageY+'px'; p.style.color = isCrit?'var(--crit)':'var(--accent)';
            p.innerText = (isCrit?'CRIT! ':'+') + format(gain);
            document.body.appendChild(p); setTimeout(()=>p.remove(), 600);
            refresh();
        },
        rebirth: () => {
            let rb = 0, cost = 1e5;
            while(state.score >= cost) { state.score -= cost; cost *= 1.7; rb++; }
            if(rb > 0) {
                state.rebirths += rb; state.currentRBPoints += rb; state.score = 0; state.midas = 1; state.hasAP = false; state.crit = 0.05;
                state.upgrades.forEach(u => { u.lvl = 0; u.c = baseItems.find(x => x.id === u.id).c; });
                refresh(); save();
            }
        },
        setTab: (t) => { state.tab = t; refresh(); },
        toggleMusic: () => {
            const m = document.getElementById('bgm');
            state.music = !state.music;
            state.music ? m.play() : m.pause();
        },
        clearData: () => { if(confirm("Wipe everything permanently?")) { localStorage.removeItem(SAVE_KEY); location.reload(); } },
        init: () => { load(); refresh(); }
    };
})();
window.onload = () => App.init();
</script>
</body>
</html>
