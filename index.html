<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenton Clicker</title>
<style>
    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        text-align: center; 
        background-color: #1e1e2f; 
        color: #e0e0e0;
        margin: 0; 
        padding: 20px; 
        display: flex; 
        flex-direction: column; 
        min-height: 95vh; 
    }
    #game-container { 
        flex-grow: 1; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
    }
    h1 { color: #f39c12; font-size: 3em; margin-bottom: 5px; }
    p.subtitle { color: #aaa; margin-top: 0; margin-bottom: 40px; }
    
    #score { 
        font-size: 4em; 
        font-weight: bold; 
        margin: 20px 0; 
        color: #ecf0f1; 
        text-shadow: 2px 2px 4px #000;
    }
    
    #trenton-btn { 
        font-size: 1.8em; 
        padding: 30px 60px; 
        background-color: #e74c3c; 
        color: white; 
        border: none; 
        border-radius: 15px; 
        cursor: pointer; 
        box-shadow: 0 8px 15px rgba(0,0,0,0.3); 
        transition: transform 0.1s, background-color 0.2s; 
        font-weight: bold;
    }
    #trenton-btn:hover { background-color: #c0392b; }
    #trenton-btn:active { transform: scale(0.92); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    
    .upgrades { 
        display: flex; 
        gap: 20px; 
        margin-top: 50px; 
        justify-content: center; 
        flex-wrap: wrap; 
    }
    .upgrade-btn { 
        padding: 20px 25px; 
        background-color: #2980b9; 
        color: white; 
        border: none; 
        border-radius: 10px; 
        cursor: pointer; 
        font-size: 1.1em; 
        box-shadow: 0 4px 8px rgba(0,0,0,0.2); 
        transition: background-color 0.2s, transform 0.1s;
        width: 200px;
    }
    .upgrade-btn:disabled { 
        background-color: #7f8c8d; 
        color: #bdc3c7;
        cursor: not-allowed; 
        box-shadow: none;
    }
    .upgrade-btn:hover:not(:disabled) { background-color: #3498db; transform: translateY(-2px); }
    
    .cost { font-weight: bold; color: #f1c40f; font-size: 1.2em; display: block; margin-top: 10px;}
    
    #stats { 
        margin-top: auto; 
        padding: 20px; 
        background-color: #2c3e50; 
        color: #ecf0f1; 
        border-radius: 10px; 
        width: 90%; 
        max-width: 800px; 
        align-self: center; 
        display: flex; 
        justify-content: space-around; 
        font-size: 1.5em; 
        font-weight: bold;
        box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
    }
</style>
</head>
<body>

<div id="game-container">
    <h1>Trenton Clicker</h1>
    <p class="subtitle">Upgrade the ultimate human.</p>
    
    <div id="score">0 Power</div>
    <button id="trenton-btn" onclick="clickTrenton()">Click Trenton!</button>

    <div class="upgrades">
        <button class="upgrade-btn" id="upgrade-mass" onclick="buyMassGain()">
            <strong>Mass Gain</strong><br><br>
            He gets massive.<br>
            <em>+1 CPS</em>
            <span class="cost">Cost: <span id="cost-mass">15</span></span>
        </button>
        
        <button class="upgrade-btn" id="upgrade-strength" onclick="buyStrengthGain()">
            <strong>Strength Gain</strong><br><br>
            He gets stronger.<br>
            <em>+3 CPC</em>
            <span class="cost">Cost: <span id="cost-strength">50</span></span>
        </button>
        
        <button class="upgrade-btn" id="upgrade-shit" onclick="buyShitPower()">
            <strong>Shit Power</strong><br><br>
            Increases the power of his shit.<br>
            <em>+2 CPS & +2 CPC</em>
            <span class="cost">Cost: <span id="cost-shit">100</span></span>
        </button>
    </div>
</div>

<div id="stats">
    <div>Clicks Per Second (CPS): <span id="stat-cps">0</span></div>
    <div>Clicks Per Click (CPC): <span id="stat-cpc">1</span></div>
</div>

<script>
    // Game Variables
    let score = 0;
    let cpc = 1; // Clicks Per Click
    let cps = 0; // Clicks Per Second

    // Upgrade Costs
    let costs = {
        mass: 15,
        strength: 50,
        shit: 100
    };

    // UI Update Loop
    function updateUI() {
        document.getElementById('score').innerText = Math.floor(score) + " Power";
        document.getElementById('stat-cpc').innerText = cpc;
        document.getElementById('stat-cps').innerText = cps;
        
        document.getElementById('cost-mass').innerText = Math.floor(costs.mass);
        document.getElementById('cost-strength').innerText = Math.floor(costs.strength);
        document.getElementById('cost-shit').innerText = Math.floor(costs.shit);

        // Gray out buttons if you can't afford them
        document.getElementById('upgrade-mass').disabled = score < costs.mass;
        document.getElementById('upgrade-strength').disabled = score < costs.strength;
        document.getElementById('upgrade-shit').disabled = score < costs.shit;
    }

    // Main Click Function
    function clickTrenton() {
        score += cpc;
        updateUI();
    }

    // Upgrade Functions
    function buyMassGain() {
        if (score >= costs.mass) {
            score -= costs.mass;
            cps += 1;
            costs.mass *= 1.5; // Cost scales up by 1.5x each purchase
            updateUI();
        }
    }

    function buyStrengthGain() {
        if (score >= costs.strength) {
            score -= costs.strength;
            cpc += 3;
            costs.strength *= 1.5;
            updateUI();
        }
    }

    function buyShitPower() {
        if (score >= costs.shit) {
            score -= costs.shit;
            cps += 2;
            cpc += 2;
            costs.shit *= 1.5;
            updateUI();
        }
    }

    // Automatic CPS Interval (runs every 1000 milliseconds / 1 second)
    setInterval(() => {
        score += cps;
        updateUI();
    }, 1000);

    // Initialize UI on load
    updateUI();
</script>
</body>
</html>
